      return `<div class="zeile" data-azubi="${a.id}">
        <div><div class="haupt">${nm||a.id}</div>
        <div class="meta">${a.ausbildung} · ${a.kurs||"—"} · ${a.einsaetze.length} Einsätze</div></div>
        <div class="rechts"><span class="pill">${f.erledigt}/${f.gesamt} Besuche</span>${fehlt?`<span class="pill fehlt">${fehlt} fehlt</span>`:""}</div></div>`;
    }).join("") || `<div class="leer">Noch keine Azubis. Über „CSV importieren" einlesen.</div>`;
    return `<div class="spalte">
        <h2>Azubis</h2>
        <div class="werkzeug">${umschalter}<button class="aktion" id="csvImport">CSV importieren</button></div>
        ${liste}
      </div>
      <div class="spalte" id="azubiDetail"><div class="leer">Azubi links auswählen.</div></div>`;
  },

  /* ---- Azubi-Kalender (Einsatz-Zeitleiste über alle eigenen Azubis) ---- */
  viewKalender(umschalter){
    const azubis=Azubis.alle();
    const heute=new Date().toISOString().slice(0,10);
    const anker=this.kalAnker||heute;
    const zoom=this.kalZoom;
    const fenster=Kalender.fenster(zoom, anker);
    const breite=Kalender.trackBreite(zoom, fenster);
    const raster=Kalender.raster(zoom, fenster);
    const heutePct=Kalender.heutePct(fenster, heute);

    if(azubis.length===0){
      return `<div class="spalte" style="grid-column:1/-1">
        <h2>Azubis</h2>
        <div class="werkzeug">${umschalter}<button class="aktion" id="csvImport">CSV importieren</button></div>
        <div class="leer">Noch keine Azubis. Über „CSV importieren" einlesen.</div></div>`;
    }

    // Rasterlinien-HTML (einmal je Spur eingesetzt) und Kopf-Ticks (mit Beschriftung)
    const gridHtml=raster.map(p=>`<div class="kal-grid${p.wochenende?' we':''}" style="left:${p.pct}%;width:${p.breitePct}%"></div>`).join("");
    const tickHtml=raster.map(p=>`<div class="kal-tick${p.wochenende?' we':''}" style="left:${p.pct}%;width:${p.breitePct}%"><span>${p.label}</span></div>`).join("");

    // Balken einer Spur (ein Azubi)
    const spur=(a)=>{
      const bars=a.einsaetze.map((e,idx)=>{
        const g=Kalender.geometrie(e.von, e.bis, fenster);
        if(!g) return "";
        const tk=e.typ.replace('PE ','').replace(' ','');
        const laeuft=(e.von<=heute && heute<=e.bis);
        const istWE=(e.typ==="WE");
        // Status-Punkt nur bei Pflichtbesuch
        let punkt="";
        if(e.pflichtbesuch){
          const sym={offen:"○",vorläufig:"◌",geplant:"◔",durchgeführt:"●",nachzuholen:"⟳"}[e.besuchStatus]||"○";
          punkt=`<span class="bvisit" title="Besuch: ${e.besuchStatus}">${sym}</span>`;
        }
        const ort=Einrichtungen.ortVon(e.einrichtungName);
        const ortTxt=ort&&(ort.plz||ort.ort)?` · ${[ort.plz,ort.ort].filter(Boolean).join(" ")}`:"";
        const tip=`${e.typ} · ${e.einrichtungName}${ortTxt}\n${fmtDatum(e.von)} – ${fmtDatum(e.bis)}`
          +(e.pflichtbesuch?`\nBesuch: ${e.besuchStatus}`:`\nkein Pflichtbesuch`);
        const label=g.widthPct>6 ? tk : "";
        return `<div class="kal-bar bar-${tk}${laeuft?' laeuft':''}${istWE?' we-bar':''}"
          style="left:${g.leftPct}%;width:${g.widthPct}%" title="${tip.replace(/"/g,'&quot;')}"
          data-kal-azubi="${a.id}" data-kal-idx="${idx}">${label}${punkt}</div>`;
      }).join("");
      return `<div class="kal-spur" style="width:${breite}px">${gridHtml}${bars}</div>`;
    };

    // Azubis nach Kurs gruppieren (a.kurs; leer -> "Ohne Kurs")
    const gruppen={};
    azubis.forEach(a=>{ const k=a.kurs||"Ohne Kurs"; (gruppen[k]=gruppen[k]||[]).push(a); });
    const kursNamen=Object.keys(gruppen).sort((x,y)=>x.localeCompare(y,"de"));

    const koerper=kursNamen.map(k=>{
      const zu=this.kalKurseZu.has(k);
      const kopf=`<div class="kal-zeile"><button class="kal-kurs${zu?' zu':''}" data-kal-kurs="${k.replace(/"/g,'&quot;')}" style="width:${168+breite}px">
        <span class="chevron">▾</span> ${k} <span class="kanz">${gruppen[k].length} Azubis</span></button></div>`;
      if(zu) return kopf;
      const zeilen=gruppen[k].map(a=>{
        const nm=Azubis.name(a.id)||a.id;
        const f=Azubis.fortschritt(a);
        return `<div class="kal-zeile">
          <div class="kal-name"><span class="knm">${nm}</span><span class="kmeta">${a.ausbildung} · ${f.erledigt}/${f.gesamt}</span></div>
          ${spur(a)}</div>`;
      }).join("");
      return kopf+zeilen;
    }).join("");

    const heuteLinie = heutePct!=null
      ? `<div id="kalHeute" style="left:calc(168px + ${breite}px * ${heutePct/100});height:100%"></div>` : "";

    const legende=`<div class="kal-legende">
      <span><i style="background:#9cc6d4"></i>OE/VE</span>
      <span><i style="background:#d6e6ee"></i>Akut</span>
      <span><i style="background:#dceae0"></i>LZP</span>
      <span><i style="background:#fbe2cf"></i>Amb</span>
      <span><i style="background:#f6e4ad"></i>Päd</span>
      <span><i style="background:#ecdcec"></i>Psych</span>
      <span><i style="background:#e8e8e8"></i>WE</span>
      <span><i style="box-shadow:0 0 0 2px var(--navy);background:transparent"></i>läuft</span>
      <span>○ offen · ◌ vorläufig · ◔ geplant · ● durchgeführt · ⟳ nachzuholen</span></div>`;

    return `<div class="spalte" style="grid-column:1/-1">
      <h2>Azubis – Einsatz-Zeitleiste</h2>
      <div class="kal-leiste">
        ${umschalter}
        <div class="seg-knopf" id="kalZoomUmschalter">
          <button data-zoom="monat" class="${zoom==='monat'?'an':''}">Monat</button>
          <button data-zoom="quartal" class="${zoom==='quartal'?'an':''}">Quartal</button>
          <button data-zoom="jahr" class="${zoom==='jahr'?'an':''}">Jahr</button>
        </div>
        <button class="kal-pfeil" id="kalZurueck" title="zurück">‹</button>
        <span class="kal-titel">${Kalender.fensterLabel(zoom, fenster)}</span>
        <button class="kal-pfeil" id="kalVor" title="vor">›</button>
        <button id="kalHeuteBtn">Heute</button>
        <button class="aktion" id="csvImport" style="margin-left:auto">CSV importieren</button>
      </div>
      <div id="kalScroll">
        <div style="position:relative;width:${168+breite}px">
          <div class="kal-zeile kal-kopf">
            <div class="kal-name">Azubi</div>
            <div class="kal-spur" style="width:${breite}px">${tickHtml}</div>
          </div>
          ${koerper}
          ${heuteLinie}
        </div>
      </div>
      ${legende}</div>`;
  },
  /* v0.19: Von „Anstehend" (bzw. dem Termin-Formular) direkt zum vollständigen Einsatzplan eines Azubis
     im Azubis-Tab springen. Wechselt Tab + Ansicht, baut neu auf und öffnet die Detailtabelle. */
  zumEinsatzplan(id){
    this.modalZu();
    this.tab="azubis";
    this.azubiAnsicht="liste";
    document.querySelectorAll("nav button").forEach(x=>x.classList.toggle("aktiv",x.dataset.tab==="azubis"));
    this.render();
    this.azubiDetail(id);
    const el=document.getElementById("azubiDetail");
    if(el && el.scrollIntoView) el.scrollIntoView({behavior:"smooth",block:"start"});
  },
  azubiDetail(id){
    if(!document.getElementById("azubiDetail")) return;   // anderer Tab aktiv → nichts zu füllen
    const a=Azubis.alle().find(x=>x.id===id); if(!a)return;
    const heuteISO=new Date().toISOString().slice(0,10);
    const erledigteTypen=new Set(a.einsaetze.filter(x=>x.pflichtbesuch&&x.besuchStatus==="durchgeführt").map(x=>x.typ));
    const rows=a.einsaetze.map((e,i)=>{
      const tk=e.typ.replace('PE ','').replace(' ','');
      const start=(i===0 || a.einsaetze[i-1].typ!==e.typ);            // erster Einsatz eines Typ-Blocks
      const end  =(i===a.einsaetze.length-1 || a.einsaetze[i+1].typ!==e.typ);
      const erl  = e.pflichtbesuch && erledigteTypen.has(e.typ);      // Typ erledigt → Einsatz ausgrauen
      const cls=`row-${tk}${start?' typ-start':''}${end?' typ-end':''}${erl?' erledigt':''}`;
      // v0.19: Pflichtbesuch pro Einsatz manuell an-/abwählbar für ALLE Ausbildungen (außer WE).
      // Erlaubt bei PFK mehrere Besuche je Einsatzart (z.B. Probeexamen / zweiter Besuch).
      const kannPflicht = e.typ!=="WE";
      const umschalt = kannPflicht
        ? ` <button class="winzig" data-pflicht="${i}" title="${e.pflichtbesuch?'Diesen Pflichtbesuch entfernen':'Diesen Einsatz als Pflichtbesuch markieren'}">${e.pflichtbesuch?'− Pflicht':'+ Pflicht'}</button>`
        : "";
      const besuch = e.pflichtbesuch?(()=>{
        const dt=e.besuchDatum?fmtDatum(e.besuchDatum)+(e.besuchUhrzeit?` · ${e.besuchUhrzeit}`:""):"";
        const edit=` <button class="winzig" data-besuch="${i}" title="Besuch planen / bearbeiten">✎</button>`;
        const notiz=e.besuchNotiz?`<div class="meta" style="font-style:italic">${e.besuchNotiz.replace(/</g,'&lt;')}</div>`:"";
        const laeuft=(e.von<=heuteISO && heuteISO<=e.bis && !erledigteTypen.has(e.typ))
          ? `<span class="av-jetzt" title="Einsatz läuft gerade">läuft</span>` : "";
        // v0.19: „Typ erledigt" nur, wenn DIESER Termin selbst noch offen ist (kein eigener aktiver Status).
        // Ein Zweittermin mit eigenem Status (vorläufig/geplant/nachzuholen) zeigt seinen Status weiter an,
        // damit z.B. ein geplanter Probeexamen-Termin nicht hinter „Typ erledigt" verschwindet.
        if(e.besuchStatus==="offen" && erledigteTypen.has(e.typ))
          return `<span class="bstatus b-uebernommen" title="Pflichtbesuch ${e.typ} ist über einen anderen Einsatz erledigt – hier kein Eintrag nötig">✓ Typ erledigt</span>`+edit+umschalt+notiz;
        return laeuft+`<span class="bstatus b-${e.besuchStatus}">${e.besuchStatus}</span>`+(dt?` <span class="meta">${dt}</span>`:"")+edit+umschalt+notiz;
      })():'<span class="meta">—</span>'+umschalt;
      return `${start&&i>0?'<tr class="typ-luecke"><td colspan="4"></td></tr>':''}<tr class="${cls}">
      <td><select data-typ="${i}" class="typsel ${tk}">${TYPEN.map(t=>`<option ${t===e.typ?"selected":""}>${t}</option>`).join("")}</select></td>
      <td>${e.einrichtungName}${(()=>{const o=Einrichtungen.ortVon(e.einrichtungName);return o&&(o.plz||o.ort)?`<div class="meta">${[o.plz,o.ort].filter(Boolean).join(" ")}</div>`:"";})()}</td>
      <td class="meta">${fmtDatum(e.von)} – ${fmtDatum(e.bis)}</td>
      <td>${besuch}</td>
    </tr>`;
    }).join("");
    const nm=Azubis.name(id);
    const si=Azubis.sollIst(a);
    const sollIstHtml = si
      ? `<div style="margin-bottom:6px">${si.map(x=>`<span class="pill ${x.da?'':'fehlt'}">${x.da?'✓':'✗'} ${x.typ}</span>`).join(" ")}</div>
         <div class="meta" style="margin-bottom:10px">Empfehlung: ein Besuch je Einsatzart (erster Teileinsatz). Mit „+ Pflicht" / „− Pflicht" je Einsatz frei änderbar – ein zweiter Besuch (z.B. Probeexamen) ist möglich.</div>`
      : (a.ausbildung==="PFA"
        ? `<div class="meta" style="margin-bottom:10px">PFA: 2 Pflichtbesuche – Vorschlag früh (OE) und Abschluss (VE). Mit „+ Pflicht" / „− Pflicht" je Einsatz frei verschiebbar.</div>`
        : `<div class="meta" style="margin-bottom:10px">Pflichtbereiche für ${a.ausbildung} werden separat geprüft.</div>`);
    document.getElementById("azubiDetail").innerHTML=`
      <h2>${nm||id}</h2>
      <div class="werkzeug">
        <input id="nameFeld" placeholder="Name (nur lokal)" value="${nm.replace(/"/g,'&quot;')}" style="flex:1">
        <button id="nameSpeichern">Name speichern</button>
        <button class="gefahr" id="azubiLoeschen">Azubi entfernen</button>
      </div>
      <div class="meta" style="margin-bottom:8px">Stammeinrichtung: ${a.stammeinrichtung||"—"} · ${a.ausbildung}</div>
      ${sollIstHtml}
      <table class="einsatztab"><thead><tr><th>Typ</th><th>Einrichtung</th><th>Zeitraum</th><th>Besuch</th></tr></thead><tbody>${rows}</tbody></table>`;
    document.getElementById("nameSpeichern").onclick=()=>Azubis.nameSetzen(id,document.getElementById("nameFeld").value.trim());
    document.getElementById("azubiLoeschen").onclick=()=>{ if(confirm("Diesen Azubi wirklich entfernen?")) Azubis.loeschen(id); };
    document.querySelectorAll("#azubiDetail [data-besuch]").forEach(b=>{
      b.onclick=()=>this.besuchFormular(id,+b.dataset.besuch);
    });
    document.querySelectorAll("#azubiDetail [data-pflicht]").forEach(b=>{
      b.onclick=()=>Azubis.pflichtUmschalten(id,+b.dataset.pflicht);
    });
    document.querySelectorAll("#azubiDetail [data-typ]").forEach(sel=>{
      const alt=sel.value;                 // bisheriger Typ (beim Aufbau)
      sel.onchange=()=>{
        const neu=sel.value;
        if(neu===alt) return;
        if(confirm(`Einsatztyp von „${alt}" auf „${neu}" ändern und speichern?`)) Azubis.typSetzen(id,+sel.dataset.typ,neu);
        else sel.value=alt;                // abgelehnt → zurücksetzen, nichts speichern
      };
    });
  },
  /* Besuch-Lebenslauf bearbeiten: Status (offen→geplant→durchgeführt / nachzuholen) + Datum/Uhrzeit/Notiz */
  besuchFormular(id,idx){
    const a=Azubis.alle().find(x=>x.id===id); if(!a)return;
    const e=a.einsaetze[idx]; if(!e.pflichtbesuch)return;
    const heute=new Date().toISOString().slice(0,10);
    const segs=STATUS.map(s=>`<label class="seg b-${s}"><input type="radio" name="bStatus" value="${s}" ${s===e.besuchStatus?"checked":""}> ${s}</label>`).join("");
    this.modal(`<h3>Besuch · <span class="pill ${e.typ.replace('PE ','').replace(' ','')}">${e.typ}</span> ${e.einrichtungName}</h3>
      <div class="meta" style="margin-bottom:10px">Einsatz: ${fmtDatum(e.von)} – ${fmtDatum(e.bis)}</div>
      <div class="feld"><label>Status</label><div class="seg-reihe">${segs}</div></div>
      <div class="feld-reihe">
        <div class="feld"><label>Datum</label><input type="date" id="bDatum" value="${e.besuchDatum||''}"></div>
        <div class="feld"><label>Uhrzeit</label><input type="time" id="bUhr" value="${e.besuchUhrzeit||''}"></div>
      </div>
      <div class="feld"><label>Notiz (z. B. Änderungs- oder Nachhol-Grund)</label>
        <textarea id="bNotiz" rows="2" style="font:inherit;padding:6px 8px;border:1px solid var(--rahmen);border-radius:6px;resize:vertical">${(e.besuchNotiz||'').replace(/</g,'&lt;')}</textarea></div>
      <div class="hinweis">offen → <b>vorläufig</b> (Datum gesetzt, aber noch nicht mit dem Azubi abgestimmt) → <b>geplant</b> (vom Azubi bestätigt) → <b>durchgeführt</b>.
        Entfällt ein Termin (Krankheit/Versäumnis): <b>nachzuholen</b>, danach neu planen.</div>
      <div class="modal-aktionen">
        <button id="bZumPlan" title="Zum vollständigen Einsatzplan dieses Azubis wechseln">→ Einsatzplan</button>
        <button onclick="Oberflaeche.modalZu()" style="margin-left:auto">Abbrechen</button>
        <button class="primaer" id="bSpeichern">Speichern</button>
      </div>`);
    const zp=document.getElementById("bZumPlan"); if(zp) zp.onclick=()=>this.zumEinsatzplan(id);
    // Komfort: Wechsel auf geplant/durchgeführt belegt leeres Datum mit heute vor
    document.querySelectorAll('input[name=bStatus]').forEach(r=>{
      r.onchange=()=>{ const d=document.getElementById("bDatum");
        if((r.value==="vorläufig"||r.value==="geplant"||r.value==="durchgeführt") && !d.value) d.value=heute; };
    });
    document.getElementById("bSpeichern").onclick=()=>{
      const status=document.querySelector('input[name=bStatus]:checked').value;
      const datum=document.getElementById("bDatum").value;
      const uhrzeit=document.getElementById("bUhr").value;
      const notiz=document.getElementById("bNotiz").value.trim();
      if((status==="vorläufig"||status==="geplant"||status==="durchgeführt") && !datum){ this.toast("Datum fehlt für „"+status+"“",true); return; }
      // v0.19: Warnung, wenn das Besuchsdatum außerhalb des Einsatzzeitraums liegt (nicht blockierend – Nachhol-Termine
      // dürfen bewusst knapp außerhalb liegen). Bei Ablehnung bleibt das Formular offen.
      if(datum && (datum<e.von || datum>e.bis)){
        if(!confirm(`Das Besuchsdatum ${fmtDatum(datum)} liegt außerhalb des Einsatzzeitraums (${fmtDatum(e.von)} – ${fmtDatum(e.bis)}).\n\nTrotzdem speichern?`)) return;
      }
      Azubis.besuchSetzen(id,idx,{status,datum,uhrzeit,notiz}); this.modalZu();
    };
  },

  /* ---- Einrichtungen ---- */
  viewEinrichtungen(){
    const sichtbar=Einrichtungen.alle().filter(e=>!e.schule);
    const ohneAdr=sichtbar.filter(e=>!e.strasse||!e.plz).length;
    return `<div class="spalte" style="grid-column:1/-1">
      <h2>Einrichtungen (${sichtbar.length}, davon ${sichtbar.filter(e=>e.stamm).length} Stamm${ohneAdr?` · <span style="color:#8a4b00">${ohneAdr} ohne Adresse</span>`:''})</h2>
      <div class="werkzeug">
        <button class="primaer" id="einrNeu">Neue Einrichtung</button>
        <button id="dupBereinigen">Duplikate bereinigen</button>
        <button id="einrToggle">${this._einrToggleLabel()}</button>
        <input type="search" id="einrSuche" placeholder="Suchen: Name, Ort, Straße, Alias…" value="${this.einrFilter.replace(/"/g,'&quot;')}">
      </div>
      <div id="einrGruppen"></div>
    </div>`;
  },
  /* Suchtext normalisieren: klein, ß→ss, Akzente weg → "Straße"=="strasse", "Düsseldorf"=="dusseldorf" */
  _sNorm(s){ return (s||"").toLowerCase().replace(/ß/g,"ss").normalize("NFD").replace(/[\u0300-\u036f]/g,""); },
  /* Gruppen-Keys, die aktuell mindestens eine Einrichtung enthalten (für den Toggle-Button). */
  _einrNichtleereGruppen(){
    const sichtbar=Einrichtungen.alle().filter(e=>!e.schule);
    const inGruppe=(e,key)=> key==="—" ? (!e.bereiche||e.bereiche.length===0) : (e.bereiche||[]).includes(key);
    return [...BEREICHE,"—"].filter(k=> sichtbar.some(e=>inGruppe(e,k)));
  },
  _einrAlleOffen(){
    const g=this._einrNichtleereGruppen();
    return g.length>0 && g.every(k=>this.einrOffen.has(k));
  },
  _einrToggleLabel(){ return this._einrAlleOffen() ? "▲ Alle zuklappen" : "▼ Alle aufklappen"; },
  _hebHervor(text, q){
    const t=String(text||"");
    if(!q) return t.replace(/</g,"&lt;");
    const nT=this._sNorm(t), nQ=this._sNorm(q); const i=nT.indexOf(nQ);
    if(i<0) return t.replace(/</g,"&lt;");
    const esc=x=>x.replace(/</g,"&lt;");
    return esc(t.slice(0,i))+"<mark>"+esc(t.slice(i,i+q.length))+"</mark>"+esc(t.slice(i+q.length));
  },
  /* Gruppiert nach Bereich; rendert nur den Container #einrGruppen (Fokus im Suchfeld bleibt) */
  _einrGruppenRender(){
    const box=document.getElementById("einrGruppen"); if(!box) return;
    const q=this.einrFilter.trim(); const nQ=this._sNorm(q);
    const sichtbar=Einrichtungen.alle().filter(e=>!e.schule);
    const passt=e=>{ if(!q) return true;
      const heu=[e.name,e.ort,e.plz,e.strasse,...(e.aliase||[])].join(" ");
      return this._sNorm(heu).includes(nQ); };
    const gefiltert=sichtbar.filter(passt);
    // Reihenfolge der Gruppen: BEREICHE + "Ohne Bereich" am Ende
    const gruppenKeys=[...BEREICHE,"—"];
    const inGruppe=(e,key)=> key==="—" ? (!e.bereiche||e.bereiche.length===0) : (e.bereiche||[]).includes(key);
    const label={Akut:"Akut",LZP:"Langzeit",Amb:"Ambulant","Päd":"Pädiatrie",Psych:"Psychiatrie",WE:"Weitere (WE)","—":"Ohne Bereich"};
    let html="";
    gruppenKeys.forEach(key=>{
      const liste=gefiltert.filter(e=>inGruppe(e,key))
        .sort((a,b)=> ((b.stamm?1:0)-(a.stamm?1:0)) || a.name.localeCompare(b.name,"de"));
      if(q && liste.length===0) return;                 // bei Suche leere Gruppen ausblenden
      if(!q && liste.length===0) return;                 // generell leere Gruppen ausblenden
      const offen = this.einrOffen.has(key) || (!!q);    // bei aktiver Suche alle Treffer-Gruppen offen
      const rows=liste.map(e=>`<tr${e.stamm?' class="stamm-row"':''}>
        <td>${e.stamm?'<span class="pill stamm">★ Stamm</span> ':''}${this._hebHervor(e.name,q)}${(!e.strasse||!e.plz)?' <span class="pill warn">Adresse fehlt</span>':''}</td>
        <td>${(e.bereiche&&e.bereiche.length)?e.bereiche.map(b=>`<span class="pill ${b}">${b}</span>`).join(" "):'<span class="meta">—</span>'}</td>
        <td class="meta">${this._hebHervor([e.plz,e.ort].filter(Boolean).join(" "),q)}</td>
        <td><button data-edit="${e.id}">Bearbeiten</button> <button class="gefahr" data-del="${e.id}">Löschen</button></td>
      </tr>`).join("");
      html+=`<div class="einr-gruppe">
        <button class="gruppe-kopf${offen?' offen':''}" data-gruppe="${key}">
          <span class="chevron">▸</span><span class="pill ${key==='—'?'':key}">${label[key]}</span>
          <span class="anzahl">${liste.length}</span>
        </button>
        <div class="gruppe-body"${offen?'':' hidden'}>
          <table><thead><tr><th>Name</th><th>Bereich</th><th>Ort</th><th></th></tr></thead><tbody>${rows}</tbody></table>
        </div>
      </div>`;
    });
    if(!html) html=`<div class="leer">${q?`Keine Treffer für „${q.replace(/</g,'&lt;')}".`:'Noch keine Einrichtungen. Werden beim CSV-Import gelernt oder hier angelegt.'}</div>`;
    box.innerHTML=html;
    this._einrBindGruppen();
  },
  /* Klicks innerhalb #einrGruppen neu binden (nach jedem Container-Render) */
  _einrBindGruppen(){
    document.querySelectorAll("#einrGruppen .gruppe-kopf").forEach(b=>{
      b.onclick=()=>{ const k=b.dataset.gruppe;
        if(this.einrOffen.has(k)) this.einrOffen.delete(k); else this.einrOffen.add(k);
        this._einrGruppenRender(); };
    });
    document.querySelectorAll("#einrGruppen [data-edit]").forEach(b=> b.onclick=()=>this.einrFormular(Einrichtungen.alle().find(e=>e.id===b.dataset.edit)));
    document.querySelectorAll("#einrGruppen [data-del]").forEach(b=> b.onclick=()=>{ if(confirm("Einrichtung löschen?")) Einrichtungen.loeschen(b.dataset.del); });
  },
  einrFormular(e){
    e=e||{}; const sel=new Set(e.bereiche||[]);
    const opt=BEREICHE.map(b=>`<label style="display:inline-flex;gap:4px;align-items:center;margin-right:12px"><input type="checkbox" class="fBereich" value="${b}" ${sel.has(b)?"checked":""}>${b}</label>`).join("");
    this.modal(`<h3>${e.id?"Einrichtung bearbeiten":"Neue Einrichtung"}</h3>
      <div class="feld"><label>Name</label><input id="fName" value="${(e.name||'').replace(/"/g,'&quot;')}"></div>
      <div class="feld"><label style="display:inline-flex;gap:6px;align-items:center"><input type="checkbox" id="fStamm" ${e.stamm?'checked':''}> Stammeinrichtung (wird zuerst angezeigt)</label></div>
      <div class="feld-reihe">
        <div class="feld" style="flex-basis:100%"><label>Bereich(e)</label><div>${opt}</div></div>
        <div class="feld"><label>PLZ</label><input id="fPlz" value="${e.plz||''}"></div>
        <div class="feld"><label>Ort</label><input id="fOrt" value="${e.ort||''}"></div>
      </div>
      <div class="feld"><label>Straße</label><input id="fStrasse" value="${e.strasse||''}"></div>
      <div class="feld-reihe">
        <div class="feld"><label>Telefon</label><input id="fTel" value="${e.telefon||''}"></div>
        <div class="feld"><label>Website</label><input id="fWeb" value="${e.website||''}"></div>
      </div>
      <div class="modal-aktionen">
        <button onclick="Oberflaeche.modalZu()">Abbrechen</button>
        <button class="primaer" id="fSpeichern">Speichern</button>
      </div>`);
    document.getElementById("fSpeichern").onclick=async()=>{
      const obj={name:document.getElementById("fName").value.trim(),
        stamm:document.getElementById("fStamm").checked,
        bereiche:[...document.querySelectorAll(".fBereich:checked")].map(c=>c.value),
        plz:document.getElementById("fPlz").value.trim(), ort:document.getElementById("fOrt").value.trim(),
        strasse:document.getElementById("fStrasse").value.trim(), telefon:document.getElementById("fTel").value.trim(),
        website:document.getElementById("fWeb").value.trim()};
      if(!obj.name){ this.toast("Name fehlt",true); return; }
      if(e.id) await Einrichtungen.bearbeiten(e.id,obj); else await Einrichtungen.anlegen({...obj,aliase:[]});
      this.modalZu(); this.render();
    };
  },

  /* ---- Prüfschritt CSV ---- */
  pruefschritt(plan, queue){
    const rows=plan.eintraege.map((e,i)=>{
      const bereichOpt=BEREICHE.map(b=>`<option ${b===e.bereichVorschlag?"selected":""}>${b}</option>`).join("");
      const typOpt=TYPEN.map(t=>`<option ${t===e.typVorschlag?"selected":""}>${t}</option>`).join("");
      const ortTxt = e.ort && (e.ort.plz||e.ort.ort) ? `<div class="meta">${[e.ort.plz,e.ort.ort].filter(Boolean).join(" ")}</div>` : "";
      let zuordnen="";
      if(!e.bereichBekannt){
        const kand=Einrichtungen.aehnliche(e.einrichtungName,6);
        const opts=kand.map(k=>`<option value="${k.id}">→ zuordnen: ${k.name}${k.ort?' ('+k.ort+')':''}</option>`).join("");
        zuordnen=`<div><select data-zuordnen="${i}" style="margin-top:4px;max-width:100%"><option value="">➕ neu anlegen</option>${opts}</select></div>`;
      }
      const rowCls = e.unsicher ? 'unsicher-mark' : (e.bereichBekannt?'':'neu-mark');
      const vorschlagPill = e.unsicher ? ' <span class="pill vorschlag" title="Automatischer Verteilungsvorschlag – bitte prüfen">Vorschlag</span>' : '';
      // v0.19: „Bereits durchgeführt"-Haken (+ optionales Datum, Default = Ende des Einsatzzeitraums). WE hat keinen Pflichtbesuch.
      const durchCell = (e.typVorschlag==="WE")
        ? `<span class="meta">–</span>`
        : `<label class="meta" style="white-space:nowrap;cursor:pointer"><input type="checkbox" data-durch="${i}"> erledigt</label>
           <input type="date" data-durchdatum="${i}" value="${e.bis||''}" style="display:none;margin-top:3px;font-size:12px;width:100%;box-sizing:border-box">`;
      return `<tr class="${rowCls}">
        <td class="meta">${fmtDatum(e.von)}<br>${fmtDatum(e.bis)}</td>
        <td>${e.einrichtungName}${e.bereichBekannt?'':' <span class="pill">neu</span>'}${vorschlagPill}${ortTxt}${zuordnen}</td>
        <td><select data-bereich="${i}">${bereichOpt}</select></td>
        <td><select data-typ="${i}">${typOpt}</select></td>
        <td>${durchCell}</td></tr>`;
    }).join("");
    const fortschritt = queue ? ` <span class="meta">· Datei ${queue.nr} von ${queue.von}</span>` : "";
    // Hinweis-Banner: fehlende Pflicht-Typen und/oder Verteilungsvorschläge
    const fehlend = plan.fehlendeTypen||[];
    const hatVorschlag = plan.eintraege.some(e=>e.unsicher);
    let pruefHinweis = "";
    if(fehlend.length || hatVorschlag){
      const teile=[];
      if(hatVorschlag) teile.push(`Orange markierte Zeilen sind <b>automatische Verteilungsvorschläge</b> (z.B. ein Königshof-Einsatz als PE Akut statt PE Psych) – bitte den Einsatztyp bestätigen oder korrigieren.`);
      if(fehlend.length) teile.push(`Noch <b>nicht zugeordnet</b>: ${fehlend.join(", ")}. Prüfe, ob ein Einsatz diesem Typ entspricht, und stelle ihn von Hand ein.`);
      pruefHinweis = `<div class="hinweis warn">⚠ ${teile.join('<br>')}</div>`;
    }
    this.modal(`<h3>Prüfen: ${plan.id} (${plan.ausbildung}${plan.kurs?' · '+plan.kurs:''})${fortschritt}</h3>
      <div class="hinweis">Stammeinrichtung: <b>${plan.stammeinrichtung||'—'}</b>. Vorschläge prüfen und ggf. ändern.
        Gelb markierte Einrichtungen sind neu und werden mit dem gewählten Bereich angelegt.
        <br>Läuft die Ausbildung schon? Setze bei bereits absolvierten Pflichtbesuchen den Haken <b>„erledigt"</b> – der Besuch wird direkt auf „durchgeführt" gesetzt (Datum anpassbar, Standard = Einsatzende).</div>
      ${pruefHinweis}
      <div class="pruef-scroll"><table class="prueftab">
      <colgroup><col style="width:84px"><col><col style="width:88px"><col style="width:108px"><col style="width:92px"></colgroup>
      <thead><tr><th>Zeitraum</th><th>Einrichtung</th><th>Bereich</th><th>Einsatztyp</th><th>Durchgeführt</th></tr></thead>
      <tbody>${rows}</tbody></table></div>
      <div class="modal-aktionen">
        ${queue
          ? `<button id="pabbrechen" class="gefahr">Rest abbrechen</button><button id="pueberspringen">Überspringen</button>`
          : `<button id="pabbrechen">Abbrechen</button>`}
        <button class="aktion" id="puebernehmen">Übernehmen</button>
      </div>`);
    const weiter=()=>{ this.modalZu(); if(queue&&queue.danach) queue.danach(); };
    const pa=document.getElementById("pabbrechen");
    if(pa) pa.onclick=()=>{ if(queue&&queue.abbrechen) queue.abbrechen(); this.modalZu(); };
    const pu=document.getElementById("pueberspringen");
    if(pu) pu.onclick=()=>weiter();
    // v0.19: Datumsfeld nur zeigen, wenn „erledigt" angehakt ist
    document.querySelectorAll('[data-durch]').forEach(cb=>{
      cb.onchange=()=>{ const d=document.querySelector(`[data-durchdatum="${cb.dataset.durch}"]`);
        if(d) d.style.display = cb.checked ? "block" : "none"; };
    });
    document.getElementById("puebernehmen").onclick=async()=>{
      const korr=plan.eintraege.map((_,i)=>{
        const z=document.querySelector(`[data-zuordnen="${i}"]`);
        const dc=document.querySelector(`[data-durch="${i}"]`);
        const dd=document.querySelector(`[data-durchdatum="${i}"]`);
        return { bereich:document.querySelector(`[data-bereich="${i}"]`).value,
                 typ:document.querySelector(`[data-typ="${i}"]`).value,
                 zuordnenId: z? z.value : "",
                 durchgefuehrt: !!(dc && dc.checked),
                 durchDatum: dd ? dd.value : "" };
      });
      await Eingang.uebernehmen(plan,korr);
      if(queue&&queue.onImport) queue.onImport();
      weiter();
    };
  },

  /* ---- Touren (Karte) ---- */
  viewTouren(){
    /* v0.17 – Layout Option C: Karte fix links, Panel rechts scrollbar (Vorschläge → Builder → Touren).
       Legende ohne „überfällig" – rote Pins gibt es seit v0.16d nicht mehr. */
    return `<div class="spalte" style="grid-column:1/-1">
      <h2>Touren</h2>
      <div id="tourGeoHinweis" class="geo-hinweis" style="display:none"></div>
      <div class="tour-layout">
        <div class="tour-links">
          <div id="tourKarte" class="tour-karte"></div>
          <div class="tour-legende">
            <span class="lg"><span class="pkt" style="background:#1D9E75"></span>geplant</span>
            <span class="lg"><span class="pkt" style="background:#BA7517"></span>vorläufig</span>
            <span class="lg"><span class="pkt" style="background:#888780;border:1px dashed #5b5a55"></span>kein Termin</span>
            <span class="lg"><span class="pkt" style="background:#F05A28"></span>Tour-Stop</span>
            <span class="lg">🏫 Schule</span>
            <span class="lg">🏠 Privat</span>
            <span class="lg" style="margin-left:auto">© OpenStreetMap-Mitwirkende (ODbL)</span>
          </div>
        </div>
        <div class="tour-rechts">
          <div class="tour-panel">${this._tourVorschlaegePanel()}</div>
          <hr class="panel-trenn">
          <div id="tourBuilder">${this._tourBuilderHtml()}</div>
          <hr class="panel-trenn">
          <div id="tourListe">${this._tourListeHtml()}</div>
        </div>
      </div>
    </div>`;
  },
  _tourenInit(){
    if(typeof L==="undefined"){ const el=document.getElementById("tourKarte"); if(el) el.innerHTML='<div class="leer" style="padding:20px">Kartenbibliothek nicht geladen.</div>'; return; }
    if(Touren._karte){ try{Touren._karte.remove();}catch(_){ } Touren._karte=null; Touren._layer=null; Touren._routeLayer=null; Touren._fixLayer=null; }
    const el=document.getElementById("tourKarte"); if(!el) return;
    const karte=L.map(el,{scrollWheelZoom:true, minZoom:8,
      maxBounds:[[Touren.NRW.latMin,Touren.NRW.lngMin],[Touren.NRW.latMax,Touren.NRW.lngMax]],
      maxBoundsViscosity:0.7}).setView([51.198,6.687],10);   // Neuss als Startmitte, auf NRW begrenzt (v0.16c)
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18,
      attribution:"© OpenStreetMap-Mitwirkende (ODbL)"}).addTo(karte);
    Touren._karte=karte;
    this._tourMarkerZeichnen();
    this._tourFixMarker();                                     // v0.19: Schule + Privatadresse dauerhaft anzeigen
    this._tourPanelBinden();                                   // v0.16b: Vorschlag-Klicks verdrahten
    this._tourBuilderBinden(); this._tourListeBinden();        // v0.17: Tour-Builder + gespeicherte Touren
    karte.on("click",()=>this._tourHighlightAus());            // v0.16b: Klick auf Karte → Highlight aus
    setTimeout(()=>{ try{karte.invalidateSize();}catch(_){ } },60);   // Layout-Korrektur nach Tab-Wechsel
    // Geocodierung bei Bedarf (nur relevante Einrichtungen ohne Koordinaten), mit Fortschrittsanzeige
    const fehlt=Touren.fehlendeKoordinaten();
    if(fehlt.length){
      const hinweis=document.getElementById("tourGeoHinweis");
      if(hinweis){ hinweis.style.display="block"; hinweis.textContent=`Einrichtungen werden verortet (0/${fehlt.length})…`; }
      Touren.geocodierenWennNoetig((i,g)=>{ if(hinweis) hinweis.textContent=`Einrichtungen werden verortet (${i}/${g})…`; })
        .then(geaendert=>{
          if(this.tab!=="touren") return;
          if(hinweis) hinweis.style.display="none";
          if(geaendert){ this._tourMarkerZeichnen(); this._tourPanelAktualisieren();   // neue Koordinaten → ggf. neue Stufe-2-Vorschläge
            try{Touren._karte.invalidateSize();}catch(_){ } }
        });
    }
  },
  _tourMarkerZeichnen(einpassen){
    const karte=Touren._karte; if(!karte) return;
    if(Touren._layer){ try{karte.removeLayer(Touren._layer);}catch(_){ } }
    const layer=L.layerGroup().addTo(karte); Touren._layer=layer;
    Touren._marker={};                                   // v0.16b: Pin-Referenzen neu aufbauen
    if(Touren._highlightLinie){ try{karte.removeLayer(Touren._highlightLinie);}catch(_){ } Touren._highlightLinie=null; }
    Touren._highlightVid=null;
    const daten=Touren.markerDaten(); const bounds=[];
    for(const d of daten){
      const grp=Touren.topGruppe(d.eintraege);
      const farbe=Touren.FARBE[grp]||"#888780";
      const n=d.eintraege.length;
      const klasse="map-pin"+(grp==="kein"?" map-pin-offen":"");
      const ico=L.divIcon({className:"", iconSize:[26,26], iconAnchor:[13,13],
        html:`<div class="${klasse}" style="background:${farbe}">${n>1?n:""}</div>`});
      const m=L.marker([d.lat,d.lng],{icon:ico}).addTo(layer).bindPopup(this._tourPopup(d));
      Touren._marker[d.name]=m;                           // v0.16b: Referenz für Sammel-Highlight
      bounds.push([d.lat,d.lng]);
    }
    // Kartenausschnitt nur beim ersten Aufbau einpassen – nicht bei jeder Marker-Aktualisierung
    if(einpassen!==false && bounds.length) karte.fitBounds(bounds,{padding:[30,30],maxZoom:13});
  },
  /* Pins aktualisieren, ohne den vom Nutzer gewählten Ausschnitt zu verändern */
  _tourMarkerNurAktualisieren(){ if(Touren._karte) this._tourMarkerZeichnen(false); },
  /* v0.19: Schule (immer) und Privatadresse (falls verortet) als dauerhafte Marker – eigener Layer,
     damit sie bei jeder Pin-/Route-Aktualisierung bestehen bleiben. */
  _tourFixMarker(){
    const karte=Touren._karte; if(!karte || typeof L==="undefined") return;
    if(Touren._fixLayer){ try{karte.removeLayer(Touren._fixLayer);}catch(_){ } }
    const layer=L.layerGroup().addTo(karte); Touren._fixLayer=layer;
    const stil="width:26px;height:26px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 1px 4px rgba(0,0,0,.35)";
    const sIco=L.divIcon({className:"",iconSize:[26,26],iconAnchor:[13,13],
      html:`<div style="${stil};border:2px solid #104E64">🏫</div>`});
    L.marker([Touren.SCHULE.lat,Touren.SCHULE.lng],{icon:sIco,zIndexOffset:400})
      .addTo(layer).bindPopup("<b>Schule</b><br>Hammfelddamm 7, 41460 Neuss");
    const p=Daten.state.privatAdresse;
    if(p && p.lat!=null && p.lng!=null){
      const pIco=L.divIcon({className:"",iconSize:[26,26],iconAnchor:[13,13],
        html:`<div style="${stil};border:2px solid #F05A28">🏠</div>`});
      const adr=[p.strasse,[p.plz,p.ort].filter(Boolean).join(" ")].filter(Boolean).join(", ");
      L.marker([p.lat,p.lng],{icon:pIco,zIndexOffset:400})
        .addTo(layer).bindPopup("<b>Privater Startpunkt</b>"+(adr?"<br>"+adr:""));
    }
  },
  _tourPopup(d){
    const zeilen=d.eintraege.map(e=>{
      const nm=Azubis.name(e.azubiId)||e.azubiId;
      const termin=e.datum?`${Anstehend._kurz(e.datum)}${e.uhrzeit?" · "+e.uhrzeit:""}`:"Kein Termin";
      return `<div class="popup-zeile"><b>${nm}</b> · ${e.typ}<br>
        <span class="meta">${termin} · ${e.status}</span><br>
        <button class="winzig" onclick="Oberflaeche.besuchFormular('${e.azubiId}',${e.idx})">Termin bearbeiten →</button></div>`;
    }).join("");
    return `<div class="map-popup"><b>${d.name}</b><hr>${zeilen}</div>`;
  },

  /* ---- v0.16b: Sammelbesuch-Vorschlagspanel (unten im Touren-Tab) ---- */
  _tourVorschlaegePanel(){
    const att=s=>String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;");
    const vs=Touren.sammelVorschlaege();
    if(!vs.length){
      return `<h3 style="margin:0 0 6px">Sammelbesuch-Vorschläge</h3>
        <div class="leer">Keine Bündel gefunden. Vorschläge entstehen, sobald mehrere
        anstehende Besuche an derselben oder einer nahen Einrichtung (≤ ${Touren.SAMMEL_KM} km) liegen.</div>`;
    }
    const karten=vs.map(v=>{
      const markiert=Touren.istMarkiert(v);
      const einrTxt=v.einrichtungen.map(e=>e.name).join(" + ");
      const distTxt=(v.stufe===2 && v.maxDistanzKm!=null)
        ? `<span class="meta">bis ${String(v.maxDistanzKm).replace(".",",")} km</span>` : "";
      const zeilen=v.eintraege.map(e=>{
        const nm=Azubis.name(e.azubiId)||e.azubiId;
        const wo=v.stufe===2 ? ` · ${e.einrichtungName}` : "";
        const termin=e.datum ? Anstehend._kurz(e.datum) : "kein Termin";
        return `<div class="sammel-zeile"><b>${nm}</b> · ${e.typ}${wo}
          <span class="meta"> — ${termin} · ${e.status}</span></div>`;
      }).join("");
      return `<div class="sammel-karte stufe-${v.stufe}${markiert?" markiert":""}" data-vid="${att(v.id)}">
        <div class="sammel-kopf">
          <span class="stufe-badge stufe-${v.stufe}">${v.stufe===1?"gleiche Einrichtung":"nah beieinander"}</span>
          <b>${einrTxt}</b> ${distTxt}
          ${markiert?'<span class="sammel-flag">✓ Sammelbesuch</span>':""}
          <button class="sammel-mark winzig" type="button">${markiert?"Markierung aufheben":"Als Sammelbesuch markieren"}</button>
        </div>
        <div class="sammel-zeilen">${zeilen}</div>
      </div>`;
    }).join("");
    return `<h3 style="margin:0 0 8px">Sammelbesuch-Vorschläge <span class="meta">(${vs.length})</span></h3>
      <div class="meta" style="margin-bottom:8px">Vorschlag antippen → Einrichtungen auf der Karte hervorheben.</div>
      ${karten}`;
  },
  /* Klick-Handler des Panels (neu) verdrahten – nach jedem Panel-Aufbau aufrufen */
  _tourPanelBinden(){
    const self=this;
    document.querySelectorAll(".sammel-karte").forEach(k=>{
      const mb=k.querySelector(".sammel-mark");
      if(mb) mb.addEventListener("click",ev=>{ ev.stopPropagation(); self.sammelToggle(k.dataset.vid); });
      k.addEventListener("click",()=>self._tourHighlight(k.dataset.vid));
    });
    if(Touren._highlightVid){
      document.querySelectorAll(".sammel-karte").forEach(k=>k.classList.toggle("aktiv",k.dataset.vid===Touren._highlightVid));
    }
  },
  /* Panel-HTML neu setzen, ohne die Karte (Ausschnitt/Zoom) anzufassen */
  _tourPanelAktualisieren(){
    const panel=document.querySelector(".tour-panel"); if(!panel) return;
    panel.innerHTML=this._tourVorschlaegePanel();
    this._tourPanelBinden();
  },
  /* Einrichtungen eines Vorschlags auf der Karte hervorheben (Toggle); Stufe 2: Verbindungslinie */
  _tourHighlight(vid){
    const karte=Touren._karte; if(!karte) return;
    const v=Touren.sammelVorschlaege().find(x=>x.id===vid); if(!v) return;
    if(Touren._highlightVid===vid){ this._tourHighlightAus(); return; }   // erneuter Klick → aus
    this._tourHighlightAus();
    Touren._highlightVid=vid;
    const namen=new Set(v.einrichtungen.map(e=>e.name));
    for(const nm in Touren._marker){
      const ic=Touren._marker[nm]._icon; if(!ic) continue;
      if(namen.has(nm)){ ic.classList.add("tour-pin-hot"); ic.classList.remove("tour-pin-dim"); }
      else            { ic.classList.add("tour-pin-dim"); ic.classList.remove("tour-pin-hot"); }
    }
    const pts=v.einrichtungen.filter(e=>e.lat!=null&&e.lng!=null).map(e=>[e.lat,e.lng]);
    if(v.stufe===2 && pts.length>1){
      Touren._highlightLinie=L.polyline(pts,{color:"#104E64",weight:2,dashArray:"4 5",opacity:.85}).addTo(karte);
    }
    document.querySelectorAll(".sammel-karte").forEach(k=>k.classList.toggle("aktiv",k.dataset.vid===vid));
  },
  _tourHighlightAus(){
    const karte=Touren._karte;
    for(const nm in Touren._marker){ const ic=Touren._marker[nm]._icon; if(ic){ ic.classList.remove("tour-pin-hot","tour-pin-dim"); } }
    if(Touren._highlightLinie && karte){ try{karte.removeLayer(Touren._highlightLinie);}catch(_){ } }
    Touren._highlightLinie=null; Touren._highlightVid=null;
    document.querySelectorAll(".sammel-karte.aktiv").forEach(k=>k.classList.remove("aktiv"));
  },
  /* Vorschlag als Sammelbesuch markieren / aufheben, danach nur Panel neu (Karte ruhig) */
  async sammelToggle(vid){
    const v=Touren.sammelVorschlaege().find(x=>x.id===vid); if(!v) return;
    await Touren.sammelUmschalten(v);
    this._tourPanelAktualisieren();
  },

  /* ===== v0.17: Tour-Builder (Panel-Abschnitt 2) ===== */
  _tb:null,                                       // Builder-Zustand (Formularwerte + Ergebnis)
  _tbLeer(){ return { offen:false, datum:new Date().toISOString().slice(0,10), startzeit:"08:00",
    startpunkt:"schule", gewaehlt:new Set(), ergebnis:null, laeuft:false, privatStatus:"" }; },

  _tourBuilderHtml(){
    if(!this._tb) this._tb=this._tbLeer();
    const tb=this._tb;
    const kopf=`<h3 style="margin:0 0 8px">Tour planen</h3>`;
    if(!tb.offen) return kopf+`<button class="aktion" id="tourNeuBtn">＋ Neue Tour planen</button>`;
    const att=s=>String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;");
    const opts=Touren.stopOptionen(tb.datum);
    const zeilen=opts.length ? opts.map(o=>{
      const namen=o.eintraege.map(e=>Azubis.name(e.azubiId)||e.azubiId).join(", ");
      const einr=o.einrichtungen.join(" + ");
      const sperr=!o.koordOk;
      const fixText=(o.fixiert&&o.fixiert.length)
        ? '<br><span class="meta">Bereits bestätigt: '+o.fixiert.map(f=>
            `${Azubis.name(f.azubiId)||f.azubiId} · ${f.typ}${f.uhrzeit?" · "+f.uhrzeit+" Uhr":""}`).join(", ")+'</span>'
        : "";
      return `<label class="tb-stop${sperr?" gesperrt":""}">
        <input type="checkbox" data-opt="${att(o.id)}"${tb.gewaehlt.has(o.id)?" checked":""}${sperr?" disabled":""}>
        <span><b>${einr}</b> (${namen})${o.sammel?' · <span class="sammel-flag">Sammelbesuch</span>':""}
        ${sperr?'<br><span class="meta">ohne Koordinaten – erst verorten (Einstellungen)</span>':""}${fixText}</span></label>`;
    }).join("") : `<div class="leer" style="padding:10px">Keine anstehenden Besuche zum Planen.</div>`;
    const priv=Daten.state.privatAdresse;
    return kopf+`
      <div class="feld-reihe">
        <div class="feld" style="flex:1"><label>Datum</label><input type="date" id="tbDatum" value="${tb.datum}"></div>
        <div class="feld" style="width:110px"><label>Startzeit</label><input type="time" id="tbStart" value="${tb.startzeit}"></div>
      </div>
      <div class="feld"><label>Startpunkt</label>
        <div style="padding:4px 0">
          <label style="margin-right:12px;cursor:pointer"><input type="radio" name="tbVon" value="schule"${tb.startpunkt==="schule"?" checked":""}> Schule</label>
          <label style="cursor:pointer"><input type="radio" name="tbVon" value="privat"${tb.startpunkt==="privat"?" checked":""}${priv?"":" disabled"}> Privat${priv?"":' <span class="meta">(keine Adresse hinterlegt)</span>'}</label>
          <span class="meta" id="tbPrivStatus" style="margin-left:8px">${tb.privatStatus||""}</span>
        </div></div>
      <div class="feld"><label>Stops auswählen <span class="meta">(anstehende Besuche, ohne überfällige und ohne bereits bestätigte Termine)</span></label>
        <div class="tb-stops">${zeilen}</div></div>
      <div class="werkzeug" style="margin-top:8px">
        <button class="primaer" id="tbBerechnen"${tb.gewaehlt.size&&!tb.laeuft?"":" disabled"}>${tb.laeuft?"berechne…":"Route berechnen"}</button>
        <button id="tbAbbrechen">Abbrechen</button>
      </div>
      ${tb.ergebnis?this._tourErgebnisHtml(tb.ergebnis):""}`;
  },

  /* Zeitplan-Tabelle + Warnungen + Speichern (nach Routenberechnung).
     v0.19: pro Azubi eine editierbare Uhrzeit (Vorbelegung = berechnete Stop-Ankunft) + Live/Fallback-Badge. */
  _tourErgebnisHtml(erg){
    const t=erg.tour;
    const km=v=>v==null?"–":String(v).replace(".",",");
    // Eine Zeile je Besuch: Einrichtung/km nur in der ersten Zeile des Stops, Uhrzeit je Azubi editierbar.
    const zeilen=t.stops.map((s,si)=>{
      const je=Math.round(s.verweildauerMin/Math.max(1,s.besuche.length));
      return s.besuche.map((b,bj)=>{
        const erste=bj===0;
        const einr=erste?`${s.einrichtungName}<div class="meta">an: ${s.ankunftGeplant}</div>`:"";
        const kmz =erste?km(s.kmVomVorigen):"";
        const uhr=b.uhrzeitGeplant||s.ankunftGeplant;
        return `<tr>
          <td>${einr}</td>
          <td>${b.azubiName||b.azubiId} <span class="meta">(${je} min)</span></td>
          <td><input type="time" class="tb-uhr" data-stop="${si}" data-besuch="${bj}" value="${uhr}" style="font:inherit;padding:2px 4px"></td>
          <td class="zahl">${kmz}</td></tr>`;
      }).join("");
    }).join("");
    const warn=t.warnungen.map(w=>`<div class="tb-warn">⚠ ${w}</div>`).join("");
    const badge=t.osrmGenutzt
      ? `<div style="background:#E3F3EC;border:1px solid #1D9E75;color:#0d5c42;padding:6px 10px;border-radius:6px;font-size:13px;margin-bottom:8px">✓ Live-Route (OSRM) – echte Straßendaten &amp; Fahrstrecke</div>`
      : `<div style="background:#FBEEDF;border:1px solid #BA7517;color:#7a4d0a;padding:6px 10px;border-radius:6px;font-size:13px;margin-bottom:8px">⚠ Schätzwert – kein Routendienst erreichbar (Luftlinie × 1,3 bei 50 km/h)</div>`;
    return `${badge}
      <table class="tb-tabelle">
        <tr><th>Stop</th><th>Azubi</th><th>Uhrzeit</th><th class="zahl">km</th></tr>
        <tr><td><b>${t.startpunkt==="privat"?"Privat":"Schule"}</b></td><td class="meta">Start</td><td>${t.startzeit}</td><td class="zahl">–</td></tr>
        ${zeilen}
        <tr><td>← Rückweg</td><td class="meta">Ankunft</td><td>${erg.rueckkehr}</td><td class="zahl">${km(erg.rueckwegKm)}</td></tr>
        <tr><td><b>Gesamt</b></td><td></td><td class="meta">~${t.fahrzeitMinGesamt} min Fahrt</td><td class="zahl"><b>${km(t.kmGesamt)} km</b></td></tr>
      </table>
      <div class="meta" style="margin:4px 0 8px">Uhrzeiten je Azubi anpassbar – der Wert wird beim Speichern übernommen. Die Route bleibt Planungsvorschlag.</div>
      ${warn}
      <div class="werkzeug" style="margin-top:8px">
        <button class="primaer" id="tbSpeichern">Tour speichern</button>
      </div>`;
  },

  _tourBuilderRendern(){
    const el=document.getElementById("tourBuilder"); if(!el) return;
    el.innerHTML=this._tourBuilderHtml();
    this._tourBuilderBinden();
  },
  _tourBuilderOeffnen(){
    this._tb=this._tbLeer(); this._tb.offen=true; this._tourBuilderRendern();
  },
  _tourBuilderBinden(){
    const neu=document.getElementById("tourNeuBtn");
    if(neu) neu.onclick=()=>this._tourBuilderOeffnen();
    const tb=this._tb; if(!tb) return;
    const d=document.getElementById("tbDatum");
    if(d) d.onchange=()=>{ tb.datum=d.value; tb.ergebnis=null; this._tourBuilderRendern(); };
    const st=document.getElementById("tbStart");
    if(st) st.onchange=()=>{ tb.startzeit=st.value||"08:00"; tb.ergebnis=null; this._tourBuilderRendern(); };
    document.querySelectorAll('input[name="tbVon"]').forEach(r=>{
      r.onchange=()=>this._tourStartpunktWahl(r.value);
    });
    document.querySelectorAll('.tb-stops input[data-opt]').forEach(c=>{
      c.onchange=()=>{
        if(c.checked){
          const opts=Touren.stopOptionen(tb.datum);
          const pruef=Touren.kapazitaetPruefen(tb.gewaehlt, opts, c.dataset.opt);
          if(!pruef.ok){
            c.checked=false;
            this.toast(`Maximal ${pruef.max} Azubis gleichzeitig an „${pruef.einrichtung}" (einstellbar in den Einstellungen).`, true);
            return;
          }
          tb.gewaehlt.add(c.dataset.opt);
        } else tb.gewaehlt.delete(c.dataset.opt);
        tb.ergebnis=null; this._tourBuilderRendern();
      };
    });
    const b=document.getElementById("tbBerechnen"); if(b) b.onclick=()=>this._tourBuilderBerechnen();
    const ab=document.getElementById("tbAbbrechen");
    if(ab) ab.onclick=()=>{ this._tb=this._tbLeer(); this._tourRouteAus(); this._tourBuilderRendern(); };
    const sp=document.getElementById("tbSpeichern"); if(sp) sp.onclick=()=>this._tourBuilderSpeichern();
    // v0.19: manuelle Uhrzeit je Azubi im Ergebnis – nur State setzen, KEIN Re-Render (Fokus behalten)
    if(tb.ergebnis) document.querySelectorAll(".tb-uhr").forEach(inp=>{
      inp.onchange=()=>{
        const si=+inp.dataset.stop, bj=+inp.dataset.besuch;
        const s=tb.ergebnis.tour.stops[si]; if(!s||!s.besuche[bj]) return;
        s.besuche[bj].uhrzeitGeplant=inp.value||s.ankunftGeplant;
      };
    });
  },

  /* Startpunkt „Privat": Geocodierung on-demand, bei Fehler zurück auf Schule (Spec §7.6) */
  async _tourStartpunktWahl(wert){
    const tb=this._tb; if(!tb) return;
    tb.ergebnis=null;
    if(wert==="schule"){ tb.startpunkt="schule"; tb.privatStatus=""; this._tourBuilderRendern(); return; }
    const a=Daten.state.privatAdresse;
    if(!a){ this.toast("Keine Privatadresse hinterlegt (Einstellungen).",true);
      tb.startpunkt="schule"; this._tourBuilderRendern(); return; }
    if(a.lat==null || a.lng==null){
      tb.startpunkt="privat"; tb.privatStatus="wird verortet…"; this._tourBuilderRendern();
      const r=await Einstellungen.privatAdresseVerorten();
      if(!r.ok){ this.toast("Privatadresse nicht gefunden – Schule wird als Startpunkt genutzt.",true);
        tb.startpunkt="schule"; tb.privatStatus=""; }
      else { tb.privatStatus="verortet ✓"; this._tourFixMarker(); }   // v0.19: Privat-Marker sofort anzeigen
      this._tourBuilderRendern(); return;
    }
    tb.startpunkt="privat"; tb.privatStatus=""; this._tourBuilderRendern();
  },

  /* Route berechnen → Zeitplan → Warnungen → Tabelle + Karten-Route */
  async _tourBuilderBerechnen(){
    const tb=this._tb; if(!tb || !tb.gewaehlt.size || tb.laeuft) return;
    if(!tb.datum){ this.toast("Bitte Datum wählen.",true); return; }
    const opts=Touren.stopOptionen().filter(o=>tb.gewaehlt.has(o.id));
    if(!opts.length){ this.toast("Die Auswahl ist nicht mehr aktuell – bitte neu wählen.",true);
      tb.gewaehlt.clear(); this._tourBuilderRendern(); return; }
    // Besuche je Einrichtung bündeln (Sammelbesuch = mehrere Besuche am selben Stop)
    const proEinr={};
    for(const o of opts) for(const e of o.eintraege){
      (proEinr[e.einrichtungName]=proEinr[e.einrichtungName]||[]).push({
        azubiId:e.azubiId, idx:e.idx, azubiName:Azubis.name(e.azubiId)||e.azubiId, typ:e.typ });
    }
    const namen=Object.keys(proEinr);
    const priv=Daten.state.privatAdresse;
    const start=(tb.startpunkt==="privat" && priv && priv.lat!=null)
      ? {lat:priv.lat, lng:priv.lng} : Touren.SCHULE;
    tb.laeuft=true; this._tourBuilderRendern();
    let route;
    try{ route=await Touren.routeBerechnen(namen, start); }
    finally{ tb.laeuft=false; }
    const geordnet=route.abschnitte.map(a=>({ einrichtungName:a.einrichtungName,
      besuche:proEinr[a.einrichtungName]||[], km:a.km, min:a.min }));
    const dauer=Math.max(10,Math.min(120,parseInt(Daten.state.besuchDauerMin,10)||37));
    const plan=Touren._zeitplanBerechnen(geordnet, route.rueckweg, tb.startzeit||"08:00", dauer);
    const warnungen=Touren._warnungenPruefen(plan, tb.startzeit||"08:00", tb.datum, Azubis.alle());
    const tour={ id:Touren._uuid(), datum:tb.datum, startzeit:tb.startzeit||"08:00", startpunkt:tb.startpunkt,
      stops:plan.stops, kmGesamt:plan.kmGesamt, fahrzeitMinGesamt:plan.fahrzeitMinGesamt,
      warnungen, osrmGenutzt:route.osrmGenutzt, dfaExportiert:false };
    tb.ergebnis={ tour, rueckkehr:plan.rueckkehr, rueckwegKm:route.rueckweg.km, geometrie:route.geometrie };
    this._tourBuilderRendern();
    this._tourRouteZeichnen([ {lat:start.lat, lng:start.lng, start:true},
      ...route.abschnitte.map(a=>({lat:a.lat, lng:a.lng})) ], route.geometrie);
  },

  async _tourBuilderSpeichern(){
    const tb=this._tb; if(!tb || !tb.ergebnis) return;
    await Touren.speichern(tb.ergebnis.tour);
    this._tb=this._tbLeer();
    this._tourRouteAus();
    this._tourBuilderRendern();
    this._tourListeRendern();
    this._tourMarkerNurAktualisieren();   // Pins können Gruppe wechseln (→ geplant)
    this._tourPanelAktualisieren();
  },

  /* ===== v0.17: Gespeicherte Touren (Panel-Abschnitt 3) ===== */
  _tourOffen:new Set(), _tourLoeschId:null, _tourLoeschTimer:null,

  _tourListeHtml(){
    const att=s=>String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;");
    const touren=Touren.alle();
    const kopf=`<h3 style="margin:0 0 8px">Gespeicherte Touren <span class="meta">(${touren.length})</span></h3>`;
    if(!touren.length) return kopf+`<div class="leer">Noch keine Touren gespeichert.</div>`;
    const fmt=iso=>{ const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(iso||""); return m?`${m[3]}.${m[2]}.${m[1]}`:(iso||""); };
    const km=v=>v==null?"–":String(v).replace(".",",");
    return kopf+touren.map(t=>{
      if(this._tourLoeschId===t.id)
        return `<div class="tour-undo">Tour ${fmt(t.datum)} wird gelöscht (5 s)…
          <button class="winzig" data-undo="${att(t.id)}" style="margin-left:auto">Rückgängig</button></div>`;
      const offen=this._tourOffen.has(t.id);
      const warn=t.warnungen&&t.warnungen.length
        ? `<span class="meta" style="color:#8a5b15">⚠ ${t.warnungen.length} Warnung${t.warnungen.length>1?"en":""}</span>` : "";
      const dfa=t.dfaExportiert?'<span class="badge-dfa">DFA exportiert</span>':"";
      const detail=offen?`<div class="tour-detail">
        ${t.stops.map(s=>{
          const wer=s.besuche.map(b=>`${b.azubiName||b.azubiId} (${b.typ})`).join(", ");
          return `<div class="sammel-zeile"><b>${s.ankunftGeplant}–${s.abfahrtGeplant}</b> ${s.einrichtungName}<span class="meta"> — ${wer}</span></div>`;
        }).join("")}
        ${(t.warnungen||[]).map(w=>`<div class="tb-warn">⚠ ${w}</div>`).join("")}
        ${t.osrmGenutzt?"":'<div class="meta">Schätzwerte (kein Routendienst)</div>'}
      </div>`:"";
      return `<div class="tour-eintrag${offen?" aktiv":""}" data-tour="${att(t.id)}">
        <div class="kopf"><b>${fmt(t.datum)}</b> · ${t.startpunkt==="privat"?"Privat":"Schule"} · ${t.stops.length} Stop${t.stops.length!==1?"s":""} · ${km(t.kmGesamt)} km ${warn} ${dfa}
          <button class="winzig" data-loesch="${att(t.id)}" style="margin-left:auto">Löschen</button></div>
        ${detail}</div>`;
    }).join("");
  },
  _tourListeRendern(){
    const el=document.getElementById("tourListe"); if(!el) return;
    el.innerHTML=this._tourListeHtml();
    this._tourListeBinden();
  },
  _tourListeBinden(){
    const self=this;
    document.querySelectorAll(".tour-eintrag[data-tour]").forEach(k=>{
      k.addEventListener("click",()=>self._tourDetailToggle(k.dataset.tour));
      const lb=k.querySelector("[data-loesch]");
      if(lb) lb.addEventListener("click",ev=>{ ev.stopPropagation(); self._tourLoeschAnfrage(lb.dataset.loesch); });
    });
    document.querySelectorAll("[data-undo]").forEach(b=>{
      b.addEventListener("click",ev=>{ ev.stopPropagation(); self._tourLoeschUndo(); });
    });
  },
  /* Details auf-/zuklappen; beim Aufklappen Route der Tour auf der Karte zeigen */
  _tourDetailToggle(id){
    if(this._tourOffen.has(id)){ this._tourOffen.delete(id); this._tourRouteAus(); }
    else{
      this._tourOffen.clear(); this._tourOffen.add(id);
      const t=Touren.alle().find(x=>x.id===id);
      if(t){
        const priv=Daten.state.privatAdresse;
        const start=(t.startpunkt==="privat" && priv && priv.lat!=null)
          ? {lat:priv.lat, lng:priv.lng} : Touren.SCHULE;
        const punkte=[ {lat:start.lat, lng:start.lng, start:true},
          ...t.stops.map(s=>{ const e=Einrichtungen.finden(s.einrichtungName);
            return { lat:e?e.lat:null, lng:e?e.lng:null }; }) ];
        this._tourRouteZeichnen(punkte);                       // sofort: Luftlinie
        // v0.19: echte Straßenlinie in gespeicherter Reihenfolge nachladen (Rundtour zurück zum Start)
        const rund=[...punkte, {lat:start.lat, lng:start.lng}].filter(p=>p.lat!=null);
        Touren.streckeGeometrie(rund).then(geo=>{
          if(geo && this._tourOffen.has(id)) this._tourRouteZeichnen(punkte, geo);
        });
      }
    }
    this._tourListeRendern();
  },
  /* Löschen mit 5-s-Rückgängig (Spec §7.5); DFA-Schutz */
  _tourLoeschAnfrage(id){
    const t=Touren.alle().find(x=>x.id===id); if(!t) return;
    if(t.dfaExportiert){ this.toast("Tour ist bereits in einer DFA abgerechnet – Löschen gesperrt.",true); return; }
    if(this._tourLoeschTimer){ clearTimeout(this._tourLoeschTimer); this._tourLoeschFinal(); }  // vorherige sofort abschließen
    this._tourLoeschId=id;
    this._tourLoeschTimer=setTimeout(()=>this._tourLoeschFinal(),5000);
    this._tourListeRendern();
  },
  async _tourLoeschFinal(){
    const id=this._tourLoeschId;
    if(this._tourLoeschTimer) clearTimeout(this._tourLoeschTimer);
    this._tourLoeschTimer=null; this._tourLoeschId=null;
    if(id){ await Touren.loeschen(id); this._tourOffen.delete(id); this._tourRouteAus(); }
    if(this.tab==="touren") this._tourListeRendern();
  },
  _tourLoeschUndo(){
    if(this._tourLoeschTimer) clearTimeout(this._tourLoeschTimer);
    this._tourLoeschTimer=null; this._tourLoeschId=null;
    this._tourListeRendern();
  },

  /* ===== v0.17/v0.19: Tour-Route auf der Karte (Polylinie + nummerierte Stops) =====
     v0.19: Liegt eine echte Straßengeometrie vor (OSRM Route API), wird sie durchgezogen gezeichnet.
     Ohne Geometrie (Fallback) wird wie bisher die gepunktete Luftlinie zwischen den Stops gezeichnet –
     an der Linienart (durchgezogen vs. gepunktet) ist der Fallback auch auf der Karte erkennbar. */
  _tourRouteZeichnen(punkte, geometrie){
    this._tourRouteAus();
    const karte=Touren._karte; if(!karte || typeof L==="undefined") return;
    const pts=(punkte||[]).filter(p=>p && p.lat!=null && p.lng!=null);
    if(pts.length<2) return;
    const grp=L.layerGroup().addTo(karte);
    const echt=!!(geometrie && geometrie.length>1);
    const linie=echt ? geometrie.map(p=>[p.lat,p.lng]) : pts.map(p=>[p.lat,p.lng]);
    L.polyline(linie,{color:"#F05A28",weight:echt?4:3,opacity:.85,dashArray:echt?null:"1 7"}).addTo(grp);
    let nr=0;
    pts.forEach(p=>{
      const inner=p.start?'<div class="map-stop-nr map-stop-start">S</div>':`<div class="map-stop-nr">${++nr}</div>`;
      L.marker([p.lat,p.lng],{ icon:L.divIcon({className:"",iconSize:[22,22],iconAnchor:[11,11],html:inner}),
        interactive:false, zIndexOffset:600 }).addTo(grp);
    });
    Touren._routeLayer=grp;
    try{ karte.fitBounds(linie,{padding:[40,40],maxZoom:14}); }catch(_){ }
  },
  _tourRouteAus(){
    const karte=Touren._karte;
    if(Touren._routeLayer && karte){ try{karte.removeLayer(Touren._routeLayer);}catch(_){ } }
    Touren._routeLayer=null;
  },

  _verdrahten(){
    // Export-Sticky-Banner (Anstehend/Azubis)
    const sx=document.getElementById("stickyExportBtn");
    if(sx) sx.onclick=()=>ImportExport.termineExportieren();
    // Anstehende Besuche: ganze Karte öffnet den Besuch-Dialog (planen/bearbeiten)
    document.querySelectorAll(".av-karte").forEach(k=>{
      k.onclick=()=>{ this.besuchFormular(k.dataset.anstAzubi, +k.dataset.anstIdx); };
    });
    // Azubis
    const imp=document.getElementById("csvImport");
    if(imp) imp.onclick=()=>this._csvDialog();
    document.querySelectorAll("[data-azubi]").forEach(z=> z.onclick=()=>this.azubiDetail(z.dataset.azubi));
    // Azubis: Umschalter Liste|Kalender
    document.querySelectorAll("#azubiAnsichtUmschalter button").forEach(b=>{
      b.onclick=()=>{ this.azubiAnsicht=b.dataset.ansicht; this.render(); };
    });
    // Kalender: Zoom, Blättern, Heute, Kursköpfe, Balken-Klick
    document.querySelectorAll("#kalZoomUmschalter button").forEach(b=>{
      b.onclick=()=>{ this.kalZoom=b.dataset.zoom; this.render(); };
    });
    const kz=document.getElementById("kalZurueck");
    if(kz) kz.onclick=()=>{ const a=this.kalAnker||new Date().toISOString().slice(0,10);
      this.kalAnker=Kalender.blaettern(this.kalZoom,a,-1); this.render(); };
    const kv=document.getElementById("kalVor");
    if(kv) kv.onclick=()=>{ const a=this.kalAnker||new Date().toISOString().slice(0,10);
      this.kalAnker=Kalender.blaettern(this.kalZoom,a,1); this.render(); };
    const kh=document.getElementById("kalHeuteBtn");
    if(kh) kh.onclick=()=>{ this.kalAnker=null; this.render(); };
    document.querySelectorAll("[data-kal-kurs]").forEach(b=>{
      b.onclick=()=>{ const k=b.dataset.kalKurs;
        if(this.kalKurseZu.has(k)) this.kalKurseZu.delete(k); else this.kalKurseZu.add(k);
        this.render(); };
    });
    document.querySelectorAll(".kal-bar[data-kal-azubi]").forEach(b=>{
      b.onclick=()=>{ const id=b.dataset.kalAzubi, idx=+b.dataset.kalIdx;
        const a=Azubis.alle().find(x=>x.id===id); if(!a) return;
        const e=a.einsaetze[idx];
        if(e&&e.pflichtbesuch) this.besuchFormular(id,idx);
        else this.toast("Kein Pflichtbesuch – kein Besuch zu planen."); };
    });
    // Einrichtungen
    const neu=document.getElementById("einrNeu"); if(neu) neu.onclick=()=>this.einrFormular();
    const dup=document.getElementById("dupBereinigen"); if(dup) dup.onclick=()=>Einrichtungen.duplikateBereinigen();
    const tg=document.getElementById("einrToggle");
    if(tg) tg.onclick=()=>{
      if(this._einrAlleOffen()) this.einrOffen.clear();
      else this._einrNichtleereGruppen().forEach(k=>this.einrOffen.add(k));
      this.render();   // neu rendern, damit auch das Button-Label umschaltet
    };
    const suche=document.getElementById("einrSuche");
    if(suche){ suche.oninput=()=>{ this.einrFilter=suche.value; this._einrGruppenRender(); };
      this._einrGruppenRender(); }   // Zeilen + Gruppen werden hier gebunden
    // Einstellungen
    const g=document.getElementById("geraet"); if(g) g.onchange=()=>{ Daten.state.geraet=g.value.trim(); Daten.speichern("Name gespeichert"); };
    const pSave=document.getElementById("privSpeichern");
    if(pSave) pSave.onclick=()=>{
      const s=document.getElementById("privStrasse").value.trim();
      const p=document.getElementById("privPlz").value.trim();
      const o=document.getElementById("privOrt").value.trim();
      if(!s&&!p&&!o){ Daten.state.privatAdresse=null; Daten.speichern("Private Adresse zurückgesetzt – Schule wird genutzt"); }
      else{ Daten.state.privatAdresse={strasse:s,plz:p,ort:o}; Daten.speichern("Private Adresse gespeichert"); }
      const pst=document.getElementById("privVerortenStatus"); if(pst) pst.textContent="";   // v0.17: Geocache verworfen
    };
    const pDel=document.getElementById("privLoeschen");
    if(pDel) pDel.onclick=()=>{
      Daten.state.privatAdresse=null;
      ["privStrasse","privPlz","privOrt"].forEach(idf=>{const el=document.getElementById(idf); if(el) el.value="";});
      Daten.speichern("Private Adresse zurückgesetzt – Schule wird genutzt");
    };
    // v0.17: Privatadresse verorten (Nominatim, Cache in privatAdresse.lat/lng)
    const pvo=document.getElementById("privVerorten");
    if(pvo) pvo.onclick=async()=>{
      const st=document.getElementById("privVerortenStatus");
      if(st) st.textContent="wird verortet…";
      pvo.disabled=true;
      const r=await Einstellungen.privatAdresseVerorten();
      pvo.disabled=false;
      if(st) st.textContent = r.ok ? "verortet ✓"
        : (r.grund==="keine Adresse" ? "erst Adresse eingeben und speichern." : "nicht gefunden – Schreibweise prüfen.");
    };
    // v0.17: Besuchsdauer (10–120 min, Default 37)
    const bd=document.getElementById("besuchDauer");
    if(bd) bd.onchange=()=>{
      let v=parseInt(bd.value,10); if(isNaN(v)) v=37;
      v=Math.max(10,Math.min(120,v)); bd.value=v;
      Daten.state.besuchDauerMin=v; Daten.speichern("Besuchsdauer gespeichert");
    };
    // v0.18: Max. Azubis je Sammelbesuch (2–5, Default 3)
    const ms=document.getElementById("maxSammel");
    if(ms) ms.onchange=()=>{
      let v=parseInt(ms.value,10); if(isNaN(v)) v=3;
      v=Math.max(2,Math.min(5,v)); ms.value=v;
      Daten.state.maxSammelGroesse=v; Daten.speichern("Sammelbesuch-Größe gespeichert");
    };
    const te=document.getElementById("termineExportBtn"); if(te) te.onclick=()=>ImportExport.termineExportieren();
    const be=document.getElementById("bannerExportBtn"); if(be) be.onclick=()=>ImportExport.termineExportieren();
    const im=document.getElementById("importBtn"); if(im) im.onclick=()=>this._importDialog();
    const sln=document.getElementById("startlisteNeuBtn"); if(sln) sln.onclick=()=>Einrichtungen.startlisteNeu();
    const spb=document.getElementById("spSyncBtn"); if(spb) spb.onclick=()=>SharePoint.synchronisieren(true);
    if(typeof SharePoint!=="undefined") SharePoint._statusAnzeigen();
    const gn=document.getElementById("geoNeuBtn");
    if(gn) gn.onclick=async()=>{
      const st=document.getElementById("geoNeuStatus");
      if(Touren._geocodeLaeuft){ if(st) st.textContent="läuft bereits…"; return; }
      gn.disabled=true;
      const ok=await Touren.neuVerorten((i,g)=>{ if(st) st.textContent=`${i}/${g} verortet…`; });
      gn.disabled=false;
      if(st) st.textContent = ok ? "fertig." : "keine relevanten Einrichtungen gefunden.";
    };
    const lo=document.getElementById("loeschBtn"); if(lo) lo.onclick=()=>this._loeschen();
    if(document.getElementById("sicherungsListe")) this._sicherungenZeigen();
  },
  _csvDialog(){
    const inp=document.createElement("input"); inp.type="file"; inp.accept=".csv"; inp.multiple=true;
    inp.onchange=async()=>{
      const plaene=[];
      for(const f of inp.files){ const plan=await Eingang.csvLesen(f); if(plan) plaene.push(plan); }
      if(!plaene.length){ this.toast("Keine gültige CSV erkannt.",true); return; }
      let i=0, importiert=0, abgebrochen=false;
      const naechster=()=>{
        if(abgebrochen) return;
        if(i>=plaene.length){
          if(plaene.length>1) this.toast(plaene.length+" Dateien verarbeitet, "+importiert+" Azubi(s) importiert.");
          return;
        }
        const plan=plaene[i]; i++;
        Eingang.vorschlagen(plan);
        const queue = plaene.length>1 ? {
          nr:i, von:plaene.length,
          danach:naechster,
          onImport:()=>{ importiert++; },
          abbrechen:()=>{ abgebrochen=true;
            this.toast("Import abgebrochen nach "+(i-1)+" von "+plaene.length+" Dateien. "+importiert+" Azubi(s) importiert."); }
        } : null;
        this.pruefschritt(plan, queue);
      };
      naechster();
    };
    inp.click();
  },
  _importDialog(){
    const inp=document.createElement("input"); inp.type="file"; inp.accept=".json";
    inp.onchange=()=>{ if(inp.files[0]) ImportExport.importDatei(inp.files[0]); };
    inp.click();
  },
  async _sicherungenZeigen(){
    const keys=await Sicherung.liste();
    const el=document.getElementById("sicherungsListe");
    el.innerHTML = keys.length? keys.map(k=>`<div class="zeile"><div class="meta">${new Date(k).toLocaleString("de-DE")}</div>
      <div class="rechts"><button data-restore="${k}">Wiederherstellen</button></div></div>`).join("")
      : `<div class="leer">Noch keine Sicherung.</div>`;
    el.querySelectorAll("[data-restore]").forEach(b=> b.onclick=()=>{ if(confirm("Diesen Stand wiederherstellen? Aktueller Stand wird ersetzt.")) Sicherung.wiederherstellen(b.dataset.restore); });
  },
  async _nasOrdnerAnzeigen(){
    /* entfällt ab v0.13 – automatische Ordner-Anbindung wird in der Citrix-Umgebung nicht unterstützt */
  },
  /* Gefahrenzone v0.15: zweistufige Checkliste. Startliste bleibt immer geschützt. */
  _loeschen(){
    const pakete=[
      {id:"azubis",   txt:"Azubis und Einsatzpläne löschen", vor:true},
      {id:"termine",  txt:"Terminplanung (Besuchsdaten, Status, Notizen) löschen", vor:true},
      {id:"einrManuell",txt:"Manuell hinzugefügte Einrichtungen löschen", vor:true},
      {id:"settings", txt:"Einstellungen zurücksetzen (Name, Adresse)", vor:false},
      {id:"sicherungen",txt:"Automatische Sicherungen löschen", vor:false}
    ];
    const zeilen=pakete.map(p=>`<label style="display:flex;gap:8px;align-items:flex-start;margin:6px 0">
      <input type="checkbox" class="loeschPaket" value="${p.id}" ${p.vor?"checked":""} style="margin-top:3px">
      <span>${p.txt}</span></label>`).join("");
    this.modal(`<h3>Daten löschen</h3>
      <div class="hinweis warn">⚠ Wähle aus, was gelöscht werden soll. Einrichtungen aus der SEA-Startliste werden nach dem Löschen automatisch wiederhergestellt.</div>
      ${zeilen}
      <div class="modal-aktionen">
        <button onclick="Oberflaeche.modalZu()">Abbrechen</button>
        <button class="gefahr" id="loeschWeiter">Weiter…</button>
      </div>`);
    document.getElementById("loeschWeiter").onclick=()=>{
      const scopes=[...document.querySelectorAll(".loeschPaket:checked")].map(c=>c.value);
      if(!scopes.length){ this.toast("Nichts ausgewählt.",true); return; }
      this._loeschenBestaetigen(scopes);
    };
  },
  _loeschenBestaetigen(scopes){
    this.modal(`<h3>Wirklich löschen?</h3>
      <div class="hinweis warn">⚠ <b>${scopes.length} Datenpaket(e)</b> werden unwiderruflich gelöscht. Das lässt sich nur über eine zuvor exportierte Sicherungsdatei rückgängig machen.</div>
      <div class="modal-aktionen">
        <button id="loeschZurueck">Zurück</button>
        <button class="gefahr" id="loeschJetzt">Endgültig löschen</button>
      </div>`);
    document.getElementById("loeschZurueck").onclick=()=>this._loeschen();
    document.getElementById("loeschJetzt").onclick=()=>this._loeschenAusfuehren(scopes);
  },
  async _loeschenAusfuehren(scopes){
    const s=Daten.state;
    if(scopes.includes("azubis")){ s.azubis=[]; s.azubiNamen={}; s.termine=[]; }
    if(scopes.includes("termine")){
      (s.azubis||[]).forEach(a=>(a.einsaetze||[]).forEach(e=>{
        e.besuchStatus="offen"; e.besuchDatum=null; e.besuchUhrzeit=null; e.besuchNotiz=""; }));
    }
    if(scopes.includes("einrManuell")){
      /* v0.20: nur zentrale (aus SharePoint stammende) Einrichtungen behalten, manuelle entfernen. */
      s.einrichtungen=(s.einrichtungen||[]).filter(e=> e._startliste);
    }
    if(scopes.includes("settings")){ s.geraet=""; s.privatAdresse=null; }
    if(scopes.includes("sicherungen")){ await Sicherung.alleLoeschen(); }
    Einrichtungen.startlisteSicherstellen();        // Startliste IMMER wiederherstellen
    this.modalZu();
    await Daten.speichern(scopes.length+" Datenpaket(e) gelöscht");
    this.render();
  }
};

/* ---------- Start ----------------------------------------------------- */
(async function start(){
  await Daten.laden();
  if(!Array.isArray(Daten.state.einrichtungen)) Daten.state.einrichtungen=[];
  await Sicherung.anlegen();   // Auto-Backup bei jedem Start
  Oberflaeche.init();
  // v0.20: MSAL vorbereiten und -- falls schon angemeldet -- still im
  // Hintergrund von SharePoint synchronisieren (ohne Weiterleitung).
  // Ist man nicht angemeldet, passiert nichts; der Button in den
  // Einstellungen startet die einmalige Anmeldung.
  try { SharePoint.start(); } catch(e){ console.warn("SharePoint-Start:", e); }
})();
</script>
</body>
</html>
