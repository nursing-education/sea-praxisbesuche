};

/* ---------- Einrichtungen: Liste + Bereich + CRUD --------------------- */
const Einrichtungen = {
  _norm(s){ return (s||"").toLowerCase().replace(/[^a-zäöüß0-9]/g,""); },
  alle(){ return Daten.state.einrichtungen; },
  finden(name){
    const n=this._norm(name);
    return this.alle().find(e=> this._norm(e.name)===n || (e.aliase||[]).some(a=>this._norm(a)===n));
  },
  bereicheVon(name){ const e=this.finden(name); return e? (e.bereiche||[]) : []; },
  ortVon(name){ const e=this.finden(name); return e? {plz:e.plz||"",ort:e.ort||"",strasse:e.strasse||""} : null; },
  schule(){ return this.alle().find(e=>e.schule)||null; },  // Schule (für Fahrten, nicht in der Liste)
  /* Bei mehreren Bereichen den passenden über Schlüsselwörter im Einsatz-Text wählen.
     Wichtig: Fach-Schlüsselwörter im CSV-Text entscheiden, NICHT der Anstaltsname.
     (z.B. Königshof ist Psych+Akut – „…Psych" → Psych, sonst Klinik → Akut). */
  bereichFuer(name, text){
    const bs=this.bereicheVon(name); if(bs.length<=1) return bs[0]||null;
    const s=(text||name||"").toLowerCase();
    if(/\blvr\b|psychiatr|psych/.test(s) && bs.includes("Psych")) return "Psych";
    if(/kita|pädiatr|päd|paed|kinder/.test(s) && bs.includes("Päd")) return "Päd";
    if(/ambulant|pflegestation|sozialstation|station|mobil/.test(s) && bs.includes("Amb")) return "Amb";
    if(/krankenhaus|klinik|hospital|\bkh\b/.test(s) && bs.includes("Akut")) return "Akut";
    return bs[0]; // sinnvoller Default (Caritashaus->LZP)
  },
  /* Ähnliche bestehende Einrichtungen zu einem (unbekannten) Label vorschlagen. */
  aehnliche(name, n){
    const stop=new Set(["und","der","die","das","ev","gmbh","ggmbh","gbr","fur","für","am","im","st","de","neuss"]);
    const sigTok=s=>(((s||"").toLowerCase().match(/[a-zäöüß0-9]+/g))||[]).filter(t=>t.length>2&&!stop.has(t));
    const ztoks=sigTok(name); const zn=this._norm(name); if(!zn) return [];
    const score=e=>{
      const hs=new Set(sigTok(e.name+" "+(e.aliase||[]).join(" ")));
      let s=ztoks.filter(t=>hs.has(t)).length;
      const en=this._norm(e.name);
      if(en && (en.includes(zn)||zn.includes(en))) s+=2;
      return s;
    };
    return this.alle().map(e=>({e,s:score(e)})).filter(x=>x.s>0)
      .sort((a,b)=>b.s-a.s).slice(0,n||5).map(x=>x.e);
  },
  aliasHinzufuegen(ziel, label){
    if(!ziel) return; if(!ziel.aliase) ziel.aliase=[];
    if(this._norm(label)!==this._norm(ziel.name) && !ziel.aliase.some(a=>this._norm(a)===this._norm(label)))
      ziel.aliase.push(label);
  },
  async anlegen(obj){
    obj.id = obj.id || "einr-"+Date.now()+"-"+Math.floor(Math.random()*1000);
    Daten.state.einrichtungen.push(obj); await Daten.speichern("Einrichtung angelegt"); return obj;
  },
  async bearbeiten(id,obj){
    const e=this.alle().find(x=>x.id===id); if(!e) return;
    Object.assign(e,obj); await Daten.speichern("Einrichtung geändert");
  },
  async loeschen(id){
    Daten.state.einrichtungen=this.alle().filter(x=>x.id!==id);
    await Daten.speichern("Einrichtung gelöscht"); Oberflaeche.render();
  },
  merge(liste){
    liste.forEach(e=>{ if(!this.finden(e.name)) Daten.state.einrichtungen.push(e); });
  },
  /* Sicherstellen, dass eine Einrichtung existiert (lernende Liste) */
  sicherstellen(name,bereich){
    let e=this.finden(name);
    if(!e){ e={id:"einr-"+Date.now()+"-"+Math.floor(Math.random()*1000),name,bereiche:bereich?[bereich]:[],aliase:[]};
            Daten.state.einrichtungen.push(e); }
    else { if(!e.bereiche) e.bereiche=[]; if(bereich && !e.bereiche.includes(bereich)) e.bereiche.push(bereich); }
    return e;
  },
  /* Komplette eingebaute Startliste sicherstellen: fehlende ergänzen, vorhandene unberührt lassen.
     Läuft bei jedem Start → Einrichtungen sind immer geladen, eigene Einträge bleiben erhalten. */
  /* v0.20: Keine eingebaute Startliste-Konstante mehr; Einrichtungen kommen
     live aus SharePoint (Modul SharePoint). No-Op, damit bestehende Aufrufer
     (Start, Loeschen) unveraendert laufen -- aus dem Code wird nichts ergaenzt. */
  startlisteSicherstellen(){ return 0; },
  startlisteLaden(){ SharePoint.synchronisieren(true); },
  startlisteNeu(){
    if(!confirm("Die Einrichtungsliste wird frisch aus SharePoint geladen. Zentrale Einrichtungen werden dabei aktualisiert; deine eigenen, manuell angelegten Einrichtungen bleiben erhalten. Fortfahren?")) return;
    SharePoint.synchronisieren(true);
  },
  /* Model B: zentrale Einrichtungen mit SharePoint abgleichen.
     - vorhandene zentrale Eintraege aktualisieren
     - neue hinzufuegen
     - zentrale, die es in SharePoint nicht mehr gibt, entfernen
     - manuelle Eintraege (ohne _startliste) bleiben unberuehrt
     Zuordnung ueber SharePoint-ID (spId), ersatzweise ueber den Namen. */
  mitSharePointAbgleichen(spListe){
    const bericht={neu:0, geaendert:0, entfernt:0};
    const liste=Daten.state.einrichtungen || (Daten.state.einrichtungen=[]);
    const nachSpId=new Map(); const nachName=new Map();
    liste.forEach(e=>{ if(e._startliste){
      if(e.spId!=null) nachSpId.set(String(e.spId), e);
      nachName.set(this._norm(e.name), e);
    }});
    const behalten=new Set();
    const sig=e=>JSON.stringify([e.name,e.bereiche,e.plz,e.ort,e.strasse,e.aliase,!!e.stamm,!!e.schule]);
    (spListe||[]).forEach(sp=>{
      let e = (sp.spId!=null && nachSpId.get(String(sp.spId))) || nachName.get(this._norm(sp.name)) || null;
      if(e){
        const vorher=sig(e);
        e.name=sp.name; e.bereiche=(sp.bereiche||[]).slice(); e.plz=sp.plz; e.ort=sp.ort;
        e.strasse=sp.strasse; e.aliase=(sp.aliase||[]).slice(); e.stamm=!!sp.stamm; e.schule=!!sp.schule;
        e.spId=sp.spId; e._startliste=true; e._sp=true;
        if(vorher!==sig(e)) bericht.geaendert++;
        behalten.add(e);
      } else {
        const ne={ id:"einr-"+Math.random().toString(36).slice(2,9),
          name:sp.name, bereiche:(sp.bereiche||[]).slice(), plz:sp.plz, ort:sp.ort, strasse:sp.strasse,
          aliase:(sp.aliase||[]).slice(), stamm:!!sp.stamm, schule:!!sp.schule,
          spId:sp.spId, _startliste:true, _sp:true };
        liste.push(ne); behalten.add(ne); bericht.neu++;
      }
    });
    Daten.state.einrichtungen = liste.filter(e=>{
      if(e._startliste && !behalten.has(e)){ bericht.entfernt++; return false; }
      return true;
    });
    return bericht;
  },
  duplikateBereinigen(){
    const seen=new Map(); let entfernt=0;
    Daten.state.einrichtungen=this.alle().filter(e=>{
      const k=this._norm(e.name)+"|"+this._norm(e.plz)+"|"+this._norm(e.strasse);
      if(seen.has(k)){ entfernt++; return false; } seen.set(k,true); return true;
    });
    Daten.speichern(entfernt+" Duplikat(e) entfernt"); Oberflaeche.render();
  }
};

/* ---------- Eingang: Easysoft-CSV einlesen + Prüfschritt -------------- */
/* ---------- SharePoint-Synchronisation (v0.20) ---------------------------
   Meldet den Nutzer ueber Microsoft an (MSAL, Redirect-Flow) und laedt die
   Einrichtungsliste live aus SharePoint (Graph API). "Still": ist eine
   gueltige Sitzung vorhanden, laeuft alles ohne Weiterleitung im Hintergrund;
   sonst startet der Button in den Einstellungen die einmalige Anmeldung.
   Bei Fehler (kein Netz o.ae.) bleibt der zuletzt gespeicherte Stand in der
   lokalen Datenbank aktiv. */
const SharePoint = {
  _msal: null,
  _initPromise: null,
  status: "unbekannt",   /* unbekannt | abgemeldet | angemeldet | laden | ok | fehler */
  _statusText: "",

  verfuegbar(){ return (typeof msal !== "undefined") && msal && msal.PublicClientApplication; },

  _init(){
    if(this._initPromise) return this._initPromise;
    const self=this;
    this._initPromise = (async () => {
      if(!self.verfuegbar()){ self.status="fehler"; self._statusText="Microsoft-Login nicht verfuegbar"; return; }
      const redirectUri = window.location.href.split("#")[0].split("?")[0];
      self._msal = new msal.PublicClientApplication({
        auth: {
          clientId: SP_CONFIG.clientId,
          authority: "https://login.microsoftonline.com/" + SP_CONFIG.tenantId,
          redirectUri
        },
        cache: { cacheLocation: "localStorage" }
      });
      await self._msal.initialize();
      try {
        const resp = await self._msal.handleRedirectPromise();
        if(resp){ self.status="angemeldet"; }
      } catch(e){ self._melden("Anmeldung fehlgeschlagen: " + ((e&&e.message)||e), true); }
    })();
    return this._initPromise;
  },

  _konto(){ const a=this._msal ? this._msal.getAllAccounts() : []; return (a && a.length) ? a[0] : null; },

  async _tokenStill(){
    await this._init();
    if(!this._msal) return null;
    const konto=this._konto();
    if(!konto){ this.status="abgemeldet"; return null; }
    try {
      const r=await this._msal.acquireTokenSilent({ scopes: SP_CONFIG.scopes, account: konto });
      this.status="angemeldet";
      return r.accessToken;
    } catch(e){ this.status="abgemeldet"; return null; }
  },

  /* App-Start: nur STILL versuchen (kein Redirect). */
  async start(){
    await this._init();
    this._statusAnzeigen();
    const token=await this._tokenStill();
    if(token){ await this._ladenUndSyncen(token); }
    this._statusAnzeigen();
  },

  /* Button: still versuchen; sonst ANMELDEN (Weiterleitung). */
  async synchronisieren(interaktiv){
    await this._init();
    if(!this._msal){ this._melden("Microsoft-Anmeldung steht in dieser Umgebung nicht zur Verfuegung.", true); return; }
    let token=await this._tokenStill();
    if(!token){
      if(interaktiv){
        this._melden("Weiterleitung zur Microsoft-Anmeldung ...");
        try { await this._msal.loginRedirect({ scopes: SP_CONFIG.scopes }); }
        catch(e){ this._melden("Anmeldung fehlgeschlagen: " + ((e&&e.message)||e), true); }
        return; /* Seite laedt nach der Rueckkehr neu; start() uebernimmt. */
      } else {
        this._melden("Nicht angemeldet -- bitte einmalig anmelden.", true);
        return;
      }
    }
    await this._ladenUndSyncen(token);
    this._statusAnzeigen();
  },

  async _graphGet(url, token){
    const r=await fetch(url, { headers: { "Authorization": "Bearer " + token } });
    const data=await r.json();
    if(!r.ok) throw new Error((data && data.error && data.error.message) || ("HTTP " + r.status));
    return data;
  },

  /* Ein SharePoint-Eintrag -> App-Einrichtung. Bereiche/Aliase sind in
     SharePoint als "; "-getrennter Text gespeichert -> werden zu Arrays. */
  _mapItem(fields){
    const F=SP_FELDER;
    const txt=(k)=> (fields[k] != null ? String(fields[k]) : "");
    const name = txt(F.name) || txt("Title");   /* Fallback: SharePoint-Standardspalte "Title" */
    const liste=(k)=> txt(k).split(/\s*;\s*/).map(x=>x.trim()).filter(Boolean);
    const jaNein=(v)=> v===true || v==="true" || v==="Ja" || v==="ja" || v==="1" || v===1;
    return {
      name: name,
      bereiche: liste(F.bereiche),
      plz:  txt(F.plz),
      ort:  txt(F.ort),
      strasse: txt(F.strasse),
      aliase: liste(F.aliase),
      stamm:  jaNein(fields[F.stamm]),
      schule: jaNein(fields[F.schule])
    };
  },

  async _ladenVonSharePoint(token){
    const site=await this._graphGet(
      "https://graph.microsoft.com/v1.0/sites/" + SP_CONFIG.host + ":" + SP_CONFIG.sitePath, token);
    const listsResp=await this._graphGet(
      "https://graph.microsoft.com/v1.0/sites/" + site.id + "/lists", token);
    const list=(listsResp.value||[]).find(l=> l.displayName===SP_CONFIG.listName || l.name===SP_CONFIG.listName);
    if(!list) throw new Error("Liste \"" + SP_CONFIG.listName + "\" nicht gefunden.");
    const itemsResp=await this._graphGet(
      "https://graph.microsoft.com/v1.0/sites/" + site.id + "/lists/" + list.id + "/items?$expand=fields&$top=999", token);
    const self=this;
    return (itemsResp.value||[]).map(function(it){
      const e=self._mapItem(it.fields||{});
      e.spId = it.id;
      return e;
    }).filter(e=> e.name);   /* Eintraege ohne Namen ueberspringen */
  },

  async _ladenUndSyncen(token){
    this.status="laden"; this._statusAnzeigen();
    let sp;
    try { sp=await this._ladenVonSharePoint(token); }
    catch(e){
      this.status="fehler";
      this._melden("Einrichtungen konnten nicht von SharePoint geladen werden -- es gilt der zuletzt gespeicherte Stand. (" + ((e&&e.message)||e) + ")", true);
      return;
    }
    const bericht=Einrichtungen.mitSharePointAbgleichen(sp);
    this.status="ok";
    await Daten.speichern(false, true);   /* Housekeeping-Speicherung ohne Export-Erinnerung */
    if(typeof Oberflaeche!=="undefined" && Oberflaeche.render) Oberflaeche.render();
    this._melden("Einrichtungen aktualisiert: " + bericht.neu + " neu, " + bericht.geaendert + " geaendert, " + bericht.entfernt + " entfernt (" + sp.length + " aus SharePoint).");
  },

  _melden(text, fehler){
    this._statusText = text;
    try { if(typeof Oberflaeche!=="undefined" && Oberflaeche.toast) Oberflaeche.toast(text, !!fehler); } catch(e){}
    this._statusAnzeigen();
  },

  _statusAnzeigen(){
    const el=document.getElementById("spStatus");
    if(!el) return;
    const map={ unbekannt:"-", abgemeldet:"nicht angemeldet", angemeldet:"angemeldet",
                laden:"laedt ...", ok:"aktuell", fehler:"Fehler" };
    let t="SharePoint: " + (map[this.status]||this.status);
    if(this._statusText) t += " - " + this._statusText;
    el.textContent=t;
  }
};

const Eingang = {
  _datum(d){ const m=(d||"").match(/(\d{2})\.(\d{2})\.(\d{4})/); return m?`${m[3]}-${m[2]}-${m[1]}`:null; },
  _bereichRaten(name){
    const s=(name||"").toLowerCase();
    if(/\blvr\b|königshof|koenigshof|psychiatr|\bpsych\b/.test(s)) return "Psych";
    if(/kita|pädiatr|\bpäd\b|paed|kinder/.test(s)) return "Päd";
    if(/krankenhaus|klinik|hospital|\bkh\b/.test(s)) return "Akut";
    if(/ambulant|pflegestation|sozialstation|pflegedienst|mobil/.test(s)) return "Amb";
    if(/behinderten|eingliederung|reha|hospiz|werkstatt/.test(s)) return "WE";
    return "LZP";
  },
  _ueberspringen(b){ return !b || /^(urlaub|theorieblock|theorie|examen|gesamt|änderungen)/i.test(b.trim()); },

  async csvLesen(file){
    const buf = await file.arrayBuffer();
    const text = new TextDecoder("windows-1252").decode(buf);   // Easysoft = cp1252
    const zeilen = text.split(/\r?\n/);
    let id=null, kurs=null, ausbildung="PFK"; const eintraege=[];
    let kopfGesehen=false, vorKopfToken=null;
    for(const z of zeilen){
      const c=z.split(";");
      const join=z.toLowerCase();
      if(/assistenz|\bpfa\b/.test(join)) ausbildung="PFA";
      const ep=z.match(/Einsatzplan\s+(.+?);*$/); if(ep) kurs=ep[1].replace(/;+$/,"").trim();
      const aid=z.match(/(azubi-\d+)/i); if(aid) id=aid[1].toLowerCase();
      if(/;von;bis;einsatzbereich/i.test(join)){
        if(!id && vorKopfToken) id=vorKopfToken;   // Fallback: ID-Zeile direkt über dem Datenkopf (z. B. „Sa_azubi")
        kopfGesehen=true; continue;
      }
      if(!kopfGesehen){
        // Kandidat für die ID-Zeile: nur Spalte 2 gefüllt (kein „Einsatzplan…", keine Adresszeile)
        if(c[1] && c[1].trim() && !c[0].trim() && c.slice(2).every(x=>!x.trim())) vorKopfToken=c[1].trim();
        continue;
      }
      const von=this._datum(c[1]), bis=this._datum(c[2]), bereichText=(c[3]||"").trim();
      if(this._ueberspringen(bereichText)) continue;
      if(!von) continue;
      const std=parseFloat((c[6]||"").replace(",",".").trim())||null;
      eintraege.push({von,bis,einrichtungName:bereichText,std});
    }
    if(!id){ Oberflaeche.toast("Keine Azubi-Kennung in der CSV gefunden",true); return null; }
    return {id,kurs,ausbildung,eintraege};
  },

  /* Typ-Vorschläge erzeugen. PFK: Lauf-Erkennung mit Stunden-Deckel (typAbleitenPFK).
     PFA: positionsbasiert (genau 2 Besuche, erster=OE / letzter=VE). */
  vorschlagen(plan){
    plan.eintraege.sort((a,b)=>a.von.localeCompare(b.von));
    const stamm = plan.eintraege.length? plan.eintraege[0].einrichtungName : null;
    const letzterIdx = plan.eintraege.length-1;
    // Erst Bereich/Ort je Eintrag anreichern (Grundlage für die Typ-Ableitung)
    plan.eintraege.forEach(e=>{
      const bekannt=Einrichtungen.bereichFuer(e.einrichtungName, e.einrichtungName);
      e.bereichVorschlag = bekannt || this._bereichRaten(e.einrichtungName);
      e.bereichBekannt = !!bekannt;
      e.ort = Einrichtungen.ortVon(e.einrichtungName);
    });
    if(plan.ausbildung==="PFA"){
      // PFA = genau 2 Pflichtbesuche: früh (OE/Stamm) + Abschluss (VE/letzter Einsatz)
      plan.eintraege.forEach((e,i)=>{
        let typ;
        if(i===0) typ="OE";
        else if(i===letzterIdx) typ="VE";
        else typ = e.bereichVorschlag==="WE" ? "WE" : "PE "+e.bereichVorschlag;
        e.typVorschlag=typ;
      });
    } else {
      // PFK = Lauf-Erkennung mit Stunden-Deckel
      const typen=typAbleitenPFK(plan.eintraege);
      plan.eintraege.forEach((e,i)=>{ e.typVorschlag=typen[i]; });
    }
    // Vollständigkeit prüfen: fehlende Pflicht-Typen ggf. per Vorschlag füllen, Rest melden.
    plan.fehlendeTypen = verteilungPruefen(plan.eintraege, plan.ausbildung);
    plan.stammeinrichtung=stamm;
    return plan;
  },

  /* Übernehmen nach Prüfschritt: Einrichtungen lernen + Azubi speichern */
  async uebernehmen(plan, korrekturen){
    // korrekturen: array {typ, bereich, zuordnenId, durchgefuehrt, durchDatum} je Eintrag (gleiche Reihenfolge)
    plan.eintraege.forEach((e,i)=>{
      const k=korrekturen[i];
      if(k.zuordnenId){
        const ziel=Einrichtungen.alle().find(x=>x.id===k.zuordnenId);
        Einrichtungen.aliasHinzufuegen(ziel, e.einrichtungName);  // Label künftig erkannt – kein Duplikat
        if(ziel && k.bereich && !(ziel.bereiche||[]).includes(k.bereich)){ (ziel.bereiche=ziel.bereiche||[]).push(k.bereich); }
      } else {
        Einrichtungen.sicherstellen(e.einrichtungName, k.bereich);
      }
      e.typ=k.typ; e.bereich=k.bereich;
      // v0.19: „Bereits durchgeführt" (nicht bei WE) → Pflichtbesuch fest setzen + Status „durchgeführt".
      if(k && k.durchgefuehrt && k.typ!=="WE"){
        e.pflichtbesuch=true; e.pflichtManuell=true;
        e.besuchStatus="durchgeführt";
        e.besuchDatum=k.durchDatum || e.bis || null;
        e.besuchUhrzeit=null;
      } else {
        e.besuchStatus="offen"; e.besuchDatum=null; e.besuchUhrzeit=null;
      }
    });
    // Pflichtbesuche je Typ am ersten Teileinsatz vorschlagen – manuell gesetzte (auch „durchgeführt") bleiben unberührt.
    pflichtbesucheMarkieren(plan.eintraege, plan.ausbildung);
    const azubi={
      id:plan.id, kuerzel:plan.id, ausbildung:plan.ausbildung, kurs:plan.kurs||"",
      stammeinrichtung:plan.stammeinrichtung||"",
      einsaetze:plan.eintraege.map(e=>({typ:e.typ,einrichtungName:e.einrichtungName,
        von:e.von,bis:e.bis,std:e.std,pflichtbesuch:e.pflichtbesuch,
        pflichtManuell:(e.pflichtManuell!=null?e.pflichtManuell:null),   // v0.19: manuelle Wahl (z.B. durchgeführt) mitnehmen
        besuchStatus:e.besuchStatus||"offen", besuchDatum:e.besuchDatum||null, besuchUhrzeit:e.besuchUhrzeit||null,
        besuchNotiz:"", sammelbesuchId:null})),
      aktualisiertAm:new Date().toISOString()
    };
    Daten.state.azubis = Merge.azubiMerge(Daten.state.azubis,[azubi]);
    await Daten.speichern("Einsatzplan "+plan.id+" übernommen");
    Oberflaeche.render();
  }
};

/* ---------- Azubis ---------------------------------------------------- */
const Azubis = {
  alle(){ return Daten.state.azubis; },
  name(id){ return Daten.state.azubiNamen[id]||""; },
  async nameSetzen(id,name){ Daten.state.azubiNamen[id]=name; await Daten.speichern("Name gespeichert (lokal)"); },
  fortschritt(a){
    const pflichtTypen=[...new Set(a.einsaetze.filter(e=>e.pflichtbesuch).map(e=>e.typ))];
    const erledigt=pflichtTypen.filter(t=>
      a.einsaetze.some(e=>e.typ===t && e.pflichtbesuch && e.besuchStatus==="durchgeführt")).length;
    return {erledigt, gesamt:pflichtTypen.length};
  },
  /* Abdeckung der 7 Pflichtbereiche (nur PFK; WE ist optional) */
  sollIst(a){
    if(a.ausbildung!=="PFK") return null;
    const da=new Set(a.einsaetze.map(e=>e.typ));
    return PFLICHT_PFK.map(t=>({typ:t, da:da.has(t)}));
  },
  /* Besuch-Lebenslauf: Status + Datum/Uhrzeit/Notiz in einem Schritt speichern */
  async besuchSetzen(id,idx,d){
    const a=this.alle().find(x=>x.id===id); if(!a)return;
    const e=a.einsaetze[idx];
    e.besuchStatus=d.status;
    e.besuchDatum=d.datum||null;
    e.besuchUhrzeit=d.uhrzeit||null;
    e.besuchNotiz=d.notiz||"";
    a.aktualisiertAm=new Date().toISOString();
    await Daten.speichern("Besuch: "+d.status);
    if(Oberflaeche.tab==="touren"){
      // Auf der Karte bleiben: nur die Pins aktualisieren, Ausschnitt + Zoom unverändert lassen
      Oberflaeche._tourMarkerNurAktualisieren();
    } else {
      Oberflaeche.render(); Oberflaeche.azubiDetail(id);
    }
  },
  /* Einsatztyp nachträglich korrigieren (nach Bestätigung). Pflichtbesuch-Status folgt der Ausbildung,
     es sei denn, er wurde für diesen Einsatz manuell festgelegt (PFA-Spielraum). */
  async typSetzen(id,idx,typ){
    const a=this.alle().find(x=>x.id===id); if(!a)return;
    const e=a.einsaetze[idx]; e.typ=typ;
    if(e.pflichtManuell==null) e.pflichtbesuch=istPflicht(a.ausbildung,typ);
    if(!e.pflichtbesuch){ e.besuchStatus="offen"; e.besuchDatum=null; e.besuchUhrzeit=null; }
    a.aktualisiertAm=new Date().toISOString();
    await Daten.speichern("Einsatztyp geändert: "+typ); Oberflaeche.render(); Oberflaeche.azubiDetail(id);
  },
  /* Pflichtbesuch eines Einsatzes manuell an-/ausschalten (Spielraum bei PFA, z. B. Besuch auf
     einen anderen Block legen). Die manuelle Wahl wird gemerkt, damit ein späterer Typ-Wechsel sie
     nicht überschreibt. */
  async pflichtUmschalten(id,idx){
    const a=this.alle().find(x=>x.id===id); if(!a)return;
    const e=a.einsaetze[idx];
    e.pflichtbesuch=!e.pflichtbesuch;
    e.pflichtManuell=e.pflichtbesuch;          // gemerkt: manuell festgelegt
    if(!e.pflichtbesuch){ e.besuchStatus="offen"; e.besuchDatum=null; e.besuchUhrzeit=null; e.besuchNotiz=""; }
    else if(!e.besuchStatus) e.besuchStatus="offen";
    a.aktualisiertAm=new Date().toISOString();
    await Daten.speichern(e.pflichtbesuch?"Pflichtbesuch gesetzt":"Pflichtbesuch entfernt");
    Oberflaeche.render(); Oberflaeche.azubiDetail(id);
  },
  async loeschen(id){
    Daten.state.azubis=this.alle().filter(x=>x.id!==id);
    await Daten.speichern("Azubi entfernt"); Oberflaeche.render();
  }
};

/* ---------- Anstehend: Pflichtbesuche, die jetzt Aufmerksamkeit brauchen ----
   Aggregiert über ALLE Azubis. Typ-Ebene: ein Typ, der über irgendeinen Einsatz
   „durchgeführt" ist, taucht nicht mehr auf. Einordnung in 4 Status-Gruppen
   (Mockup Option A): Überfällig > Diese Woche > Noch abstimmen > Noch kein Termin.
   „Überfällig" deckt bewusst auch beendete Einsätze ohne je gesetzten Termin ab. */
const Anstehend = {
  _heute(){ return new Date().toISOString().slice(0,10); },
  _tage(vonISO, bisISO){                       // ganze Tage von→bis (positiv = bis liegt später)
    const a=new Date(vonISO+"T00:00:00Z"), b=new Date(bisISO+"T00:00:00Z");
    return Math.round((b-a)/86400000);
  },
  _WT:["So","Mo","Di","Mi","Do","Fr","Sa"],
  _kurz(iso){ const m=(iso||"").match(/^(\d{4})-(\d{2})-(\d{2})/); if(!m) return iso||"";
    const d=new Date(iso+"T00:00:00Z"); return `${this._WT[d.getUTCDay()]} ${m[3]}.${m[2]}.`; },
  _montag(iso){ const d=new Date(iso+"T00:00:00Z"); const wd=(d.getUTCDay()+6)%7;  // Mo=0
    d.setUTCDate(d.getUTCDate()-wd); return d.toISOString().slice(0,10); },
  _sonntag(iso){ const d=new Date(this._montag(iso)+"T00:00:00Z");
    d.setUTCDate(d.getUTCDate()+6); return d.toISOString().slice(0,10); },
  /* Zeitliche Einordnung eines Einsatzes relativ zu heute (für Relevanz + Überfällig-Fallback) */
  zustand(e, heute){
    if(e.bis < heute) return "ueberfaellig";   // Einsatz ist vorbei, Besuch nicht erledigt
    if(e.von <= heute) return "laeuft";         // von ≤ heute ≤ bis
    return this._tage(heute, e.von)<=14 ? "bald" : "spaeter";
  },
  /* Alle relevanten Pflichtbesuche einsammeln + in 4 Status-Gruppen einordnen.
     v0.19: optionales Bezugsdatum (Default heute). Der Tourenplaner reicht das gewählte Tour-Datum durch,
     damit die Kandidatenliste die am Zieldatum laufenden Einsätze zeigt (statt immer relativ zu heute). */
  sammeln(bezugDatum){
    const heute=bezugDatum||this._heute(); const woStart=this._montag(heute), woEnde=this._sonntag(heute);
    const eintraege=[];
    for(const a of Azubis.alle()){
      // Typen, die über irgendeinen durchgeführten Besuch bereits erledigt sind
      const erledigteTypen=new Set(a.einsaetze.filter(x=>x.pflichtbesuch && x.besuchStatus==="durchgeführt").map(x=>x.typ));
      // je offenem Typ den spätesten Einsatz UND die Anzahl merken (für „letzter Einsatz dieses Typs")
      const letzteBis={}, anzahlTyp={};
      a.einsaetze.forEach(x=>{ if(x.pflichtbesuch && !erledigteTypen.has(x.typ)){
        anzahlTyp[x.typ]=(anzahlTyp[x.typ]||0)+1;
        if(!letzteBis[x.typ] || x.bis>letzteBis[x.typ]) letzteBis[x.typ]=x.bis; }});
      a.einsaetze.forEach((e,idx)=>{
        if(!e.pflichtbesuch) return;
        // v0.19: Ein Zweittermin mit eigenem aktiven Status (vorläufig/geplant/nachzuholen) bleibt sichtbar,
        // auch wenn der Typ über einen anderen Einsatz schon erledigt ist (z.B. geplanter Probeexamen-Termin).
        // Nur ein noch offener Termin eines bereits erledigten Typs wird ausgeblendet.
        if(erledigteTypen.has(e.typ) && e.besuchStatus==="offen") return;
        if(e.besuchStatus==="durchgeführt") return;
        const z=this.zustand(e,heute);
        const st=e.besuchStatus, datum=e.besuchDatum||null;
        // Relevanzfilter: weit in der Zukunft startende, terminlose Pflichtbesuche noch nicht zeigen
        if(z==="spaeter" && st!=="nachzuholen" && st!=="vorläufig" && !datum) return;
        // Gruppen-Einordnung – Reihenfolge entspricht der Priorität
        let gruppe;
        if(st==="nachzuholen" || (datum && datum<heute) || z==="ueberfaellig") gruppe="ueberfaellig";
        else if(st==="geplant" && datum && datum>=woStart && datum<=woEnde)    gruppe="diesewoche";
        else if(st==="geplant" && datum)                                       gruppe="geplant";   // bestätigt, jenseits dieser Woche → eigene Gruppe
        else if(st==="vorläufig")                                              gruppe="abstimmen";
        else                                                                   gruppe="kein";      // offen, kein (aktuelles) Datum
        if(!gruppe) return;
        eintraege.push({
          azubiId:a.id, idx, typ:e.typ, einrichtungName:e.einrichtungName,
          ort:Einrichtungen.ortVon(e.einrichtungName),
          von:e.von, bis:e.bis, status:st,
          datum, uhrzeit:e.besuchUhrzeit, zustand:z, gruppe,
          // „letzter Einsatz dieses Typs" nur warnen, wenn es überhaupt MEHRERE Einsätze dieses Typs gibt
          letzteChance: anzahlTyp[e.typ]>1 && e.bis===letzteBis[e.typ]
        });
      });
    }
    return eintraege;
  }
};

/* ---------- Geo: Geocodierung (Nominatim) + Offline-Distanz (Haversine) ----
   Nominatim-Policy: max. 1 Anfrage/Sekunde. Nur Einrichtungsadressen (öffentlich),
   niemals Azubi-Adressen. Bei Fehler/leer: lat/lng=null → Marker bleibt weg. */
const Geo = {
  /* Luftlinie in km zwischen zwei Punkten – rein offline, für Sammelbesuch-Nähe & DFA-Schätzung */
  distanz(lat1,lng1,lat2,lng2){
    if([lat1,lng1,lat2,lng2].some(v=>v==null||isNaN(v))) return null;
    const R=6371, rad=Math.PI/180;
    const dLat=(lat2-lat1)*rad, dLng=(lng2-lng1)*rad;
    const a=Math.sin(dLat/2)**2 + Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(dLng/2)**2;
    return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))*10)/10;
  },
  _sleep(ms){ return new Promise(r=>setTimeout(r,ms)); },
  /* Eine Einrichtung geocodieren → {lat,lng} oder null */
  async einzeln(e){
    const q=[e.strasse, [e.plz,e.ort].filter(Boolean).join(" ")].filter(s=>s&&s.trim()).join(", ");
    if(!q) return null;
    try{
      const url="https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=de&q="+encodeURIComponent(q);
      const res=await fetch(url,{headers:{Accept:"application/json"}});
      if(!res.ok) return null;
      const js=await res.json();
      if(!Array.isArray(js)||!js.length) return null;
      const lat=parseFloat(js[0].lat), lng=parseFloat(js[0].lon);
      return (isNaN(lat)||isNaN(lng))?null:{lat,lng};
    }catch(_){ return null; }
  },
  /* Batch mit Rate-Limit (1,1 s) + Fortschritts-Callback(i,gesamt,einrichtung) */
  async codieren(liste, onFortschritt){
    let i=0; const gesamt=liste.length;
    for(const e of liste){
      const r=await this.einzeln(e);
      e.lat = r?r.lat:null; e.lng = r?r.lng:null;
      i++; if(onFortschritt) onFortschritt(i,gesamt,e);
      if(i<gesamt) await this._sleep(1100);
    }
    return liste;
  }
};

/* ---------- Touren: Kartendaten + Geocodierungs-Orchestrierung (Schritt 4/5) ----
   Sammelbesuch-Erkennung, Routen (OSRM) und DFA folgen in späteren Bauschritten. */
const Touren = {
  _karte:null, _layer:null, _geocodeLaeuft:false, _routeLayer:null,   /* v0.17: gezeichnete Tour-Route */
  _marker:{}, _highlightVid:null, _highlightLinie:null,   // v0.16b: Pin-Referenzen + aktives Sammel-Highlight
  SAMMEL_KM:5,                                             // v0.16b: Nähe-Schwelle Stufe 2 (Anker → andere Einrichtung)
  // v0.16c: NRW-Begrenzung – Pins außerhalb (Geocoding-Ausreißer) ignorieren, Karte regional halten
  NRW:{latMin:50.30, latMax:52.60, lngMin:5.80, lngMax:9.50},
  inNRW(lat,lng){ const b=this.NRW; return lat!=null&&lng!=null&&lat>=b.latMin&&lat<=b.latMax&&lng>=b.lngMin&&lng<=b.lngMax; },
  // Pin-Farben nach Anstehend-Gruppe (Spec §6.4.3)
  FARBE:{ueberfaellig:"#E24B4A", diesewoche:"#1D9E75", geplant:"#1D9E75", abstimmen:"#BA7517", kein:"#888780"},
  _rang:{ueberfaellig:0, abstimmen:1, diesewoche:2, geplant:3, kein:4},
  /* Marker je Einrichtung – aus den anstehenden Pflichtbesuchen abgeleitet (erledigte sind raus) */
  markerDaten(){
    const proEinr={};
    for(const e of Anstehend.sammeln()){
      const ein=Einrichtungen.finden(e.einrichtungName);
      if(!ein || ein.lat==null || ein.lng==null) continue;   // ohne Koordinaten kein Pin
      if(!this.inNRW(ein.lat,ein.lng)) continue;             // v0.16c: Geocoding-Ausreißer außerhalb NRW ignorieren
      if(e.gruppe==="ueberfaellig") continue;               // v0.16d: Überfällige nicht als Karten-Pins
      (proEinr[ein.name] = proEinr[ein.name] || {name:ein.name, lat:ein.lat, lng:ein.lng, eintraege:[]}).eintraege.push(e);
    }
    return Object.values(proEinr);
  },
  /* dringlichste Gruppe an einer Einrichtung bestimmt die Pin-Farbe */
  topGruppe(eintraege){
    return eintraege.map(e=>e.gruppe).sort((a,b)=>this._rang[a]-this._rang[b])[0];
  },
  /* relevante Einrichtungen (in Einsatzplänen verwendet) OHNE Koordinaten */
  fehlendeKoordinaten(){
    const namen=new Set(Anstehend.sammeln().map(e=>e.einrichtungName));
    const out=[];
    namen.forEach(nm=>{ const e=Einrichtungen.finden(nm); if(e && e.lat==null) out.push(e); });
    return out;
  },
  async geocodierenWennNoetig(onFortschritt){
    if(this._geocodeLaeuft) return false;
    const liste=this.fehlendeKoordinaten();
    if(!liste.length) return false;
    this._geocodeLaeuft=true;
    try{ await Geo.codieren(liste, onFortschritt); await Daten.speichern("Einrichtungen verortet", true); return true; }
    finally{ this._geocodeLaeuft=false; }
  },
  /* „Koordinaten aktualisieren" (Einstellungen): relevante Einrichtungen neu verorten */
  async neuVerorten(onFortschritt){
    if(this._geocodeLaeuft) return false;
    const namen=new Set(Anstehend.sammeln().map(e=>e.einrichtungName));
    const liste=[]; namen.forEach(nm=>{ const e=Einrichtungen.finden(nm); if(e) liste.push(e); });
    if(!liste.length) return false;
    this._geocodeLaeuft=true;
    try{ await Geo.codieren(liste, onFortschritt); await Daten.speichern("Koordinaten aktualisiert", true); return true; }
    finally{ this._geocodeLaeuft=false; }
  },

  /* ===== Sammelbesuch-Erkennung (Schritt 6, Variante A: Planungssicht) =====
     Bündelt anstehende Pflichtbesuche, die sich gemeinsam abfahren lassen –
     unabhängig davon, ob schon ein Termin steht (KW spielt hier keine Rolle).
       Stufe 1: mehrere Besuche an DERSELBEN Einrichtung (keine Koordinaten nötig).
       Stufe 2: Besuche an verschiedenen, NAHEN Einrichtungen (≤ SAMMEL_KM Luftlinie).
     Anker-Verfahren (kein Chaining): die Einrichtung mit den meisten anstehenden
     Besuchen ist Anker; nur Einrichtungen im Umkreis DES ANKERS kommen dazu –
     nicht transitiv weitergereicht. Jede Einrichtung erscheint in höchstens
     einem Vorschlag. Nur Cluster mit insgesamt ≥ 2 Besuchen werden Vorschläge. */
  sammelVorschlaege(eintraege, lookup){
    // v0.16c: Überfällige bleiben außen vor – sie werden in der aktuellen/zukünftigen
    // Einrichtung nachgeholt, nicht in einer Tour gebündelt.
    eintraege = (eintraege || Anstehend.sammeln()).filter(e=>e.gruppe!=="ueberfaellig");
    lookup    = lookup    || (nm=>Einrichtungen.finden(nm));
    const max = this.maxSammelGroesse();
    // 1) Einträge je Einrichtung bündeln (+ Koordinaten via Lookup); v0.18: Einrichtungen mit mehr als
    //    `max` anstehenden Besuchen werden vorab in mehrere Häppchen (≤ max) gesplittet – jedes Häppchen
    //    bekommt einen eigenen Schlüssel und kann so einen eigenen Vorschlag ergeben, statt Personen
    //    stillschweigend zu verlieren.
    const proEinrRoh={};
    for(const e of eintraege){ (proEinrRoh[e.einrichtungName]=proEinrRoh[e.einrichtungName]||[]).push(e); }
    const proEinr={};
    Object.keys(proEinrRoh).forEach(nm=>{
      const ein=lookup(nm)||{};
      this._chunk(proEinrRoh[nm],max).forEach((ch,i)=>{
        const key = i===0 ? nm : nm+"#"+(i+1);
        proEinr[key]={ key, name:nm, lat:(ein.lat!=null?ein.lat:null), lng:(ein.lng!=null?ein.lng:null), eintraege:ch };
      });
    });
    // 2) Einrichtungen (bzw. Häppchen) nach Dringlichkeit/Anzahl sortieren → Anker-Reihenfolge
    const dringlichkeit=es=>Math.min(...es.map(x=>this._rang[x.gruppe!=null?x.gruppe:"kein"]));
    const liste=Object.values(proEinr).map(o=>({...o, anzahl:o.eintraege.length, drang:dringlichkeit(o.eintraege)}));
    liste.sort((a,b)=> b.anzahl-a.anzahl || a.drang-b.drang || a.name.localeCompare(b.name,"de"));
    // 3) Greedy-Clustering um Anker – Häppchen derselben Einrichtung dürfen sich NICHT gegenseitig wieder
    //    zusammenschließen (Distanz 0), sonst würde die Deckelung aus Schritt 1 sofort wieder aufgehoben.
    const benutzt=new Set(), vorschlaege=[];
    for(const anker of liste){
      if(benutzt.has(anker.key)) continue;
      benutzt.add(anker.key);
      const cluster=[anker];
      // v0.19 (Cap-Bug): maxSammelGroesse gilt jetzt cluster-WEIT (Summe aller Personen im Cluster),
      // nicht nur je Einrichtung. Ein Kandidat, der die Grenze sprengen würde, wird übersprungen und
      // bleibt frei für einen eigenen Vorschlag – so tauchen nie mehr als `max` Kandidaten in einem Bündel auf.
      let clusterSumme=anker.eintraege.length;
      if(anker.lat!=null && anker.lng!=null){
        for(const kand of liste){
          if(benutzt.has(kand.key) || kand.name===anker.name || kand.lat==null || kand.lng==null) continue;
          if(clusterSumme + kand.eintraege.length > max) continue;   // cluster-weite Deckelung
          const dist=Geo.distanz(anker.lat,anker.lng,kand.lat,kand.lng);
          if(dist!=null && dist<=this.SAMMEL_KM){ cluster.push(kand); benutzt.add(kand.key); clusterSumme+=kand.eintraege.length; }
        }
      }
      const alleEintraege=cluster.flatMap(c=>c.eintraege);
      if(alleEintraege.length<2) continue;                 // einzelner Besuch → kein Vorschlag
      const stufe = cluster.length>1 ? 2 : 1;
      // größte paarweise Distanz im Cluster (transparente Spannweite, kann durch Anker-Logik > SAMMEL_KM sein)
      let maxDist=null;
      if(stufe===2){
        maxDist=0;
        for(let i=0;i<cluster.length;i++) for(let j=i+1;j<cluster.length;j++){
          const d=Geo.distanz(cluster[i].lat,cluster[i].lng,cluster[j].lat,cluster[j].lng);
          if(d!=null && d>maxDist) maxDist=d;
        }
      }
      const keySort=cluster.map(c=>c.key).sort();
      vorschlaege.push({
        id:"sv:"+keySort.join("|"),
        stufe,
        einrichtungen:cluster.map(c=>({name:c.name, lat:c.lat, lng:c.lng})),
        eintraege:alleEintraege,
        anzahl:alleEintraege.length,
        maxDistanzKm:maxDist,
        drang:Math.min(...cluster.map(c=>c.drang))
      });
    }
    // 4) Sortierung: Stufe 1 vor Stufe 2; innerhalb nach Dringlichkeit, dann Anzahl ↓
    vorschlaege.sort((a,b)=> a.stufe-b.stufe || a.drang-b.drang || b.anzahl-a.anzahl);
    return vorschlaege;
  },

  /* UUID für sammelbesuchId (Chrome/Edge: crypto.randomUUID; Fallback simpel) */
  _uuid(){ return (typeof crypto!=="undefined" && crypto.randomUUID)
    ? crypto.randomUUID()
    : "sb-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,8); },

  /* Einsatz-Objekt zu einem Anstehend-Eintrag {azubiId,idx} auflösen (defensiv) */
  _einsatzVon(e){
    const a=Azubis.alle().find(x=>x.id===e.azubiId);
    return a && a.einsaetze[e.idx] ? a.einsaetze[e.idx] : null;
  },

  /* Ist dieser Vorschlag bereits als Sammelbesuch markiert?
     → alle beteiligten Einsätze teilen dieselbe (nicht-null) sammelbesuchId */
  istMarkiert(v){
    const ids=v.eintraege.map(e=>{ const s=this._einsatzVon(e); return s?s.sammelbesuchId:undefined; });
    return ids.length>0 && ids[0]!=null && ids.every(x=>x===ids[0]);
  },

  /* Vorschlag als Sammelbesuch markieren / Markierung aufheben (setzt sammelbesuchId).
     Echte Datenänderung → reguläres Speichern (Export-Kennzeichnung). */
  async sammelUmschalten(v){
    const markiert=this.istMarkiert(v);
    const neueId = markiert ? null : this._uuid();
    let geaendert=false;
    for(const e of v.eintraege){
      const s=this._einsatzVon(e);
      if(s){ s.sammelbesuchId=neueId; geaendert=true;
        const a=Azubis.alle().find(x=>x.id===e.azubiId); if(a) a.aktualisiertAm=new Date().toISOString(); }
    }
    if(geaendert) await Daten.speichern(markiert?"Sammelbesuch aufgehoben":"Als Sammelbesuch markiert");
    return !markiert;
  },

  /* ===== v0.17 – Schritt 7: Routenplanung + Tour speichern =====
     Alle Berechnungen laufen lokal; nur die OSRM Table API ist ein optionaler
     Online-Aufruf (mit Offline-Fallback Luftlinie×1,3 bei 50 km/h). */

  /* Schulstandort fest verdrahtet (OSM way 150872923, Hammfelddamm 7 Neuss) –
     bewusst NICHT geocodiert, damit der Startpunkt offline immer stimmt. */
  SCHULE:{lat:51.19371, lng:6.70942},

  /* "HH:MM" ↔ Minuten seit Mitternacht */
  _minVon(hhmm){ const m=/^(\d{1,2}):(\d{2})$/.exec(hhmm||""); return m ? (+m[1])*60+(+m[2]) : null; },
  _hhmm(min){ min=Math.round(min); const h=Math.floor(min/60), mm=min%60;
    return String(h).padStart(2,"0")+":"+String(mm).padStart(2,"0"); },

  /* Fallback-Abschnitt: Luftlinie × 1,3; Fahrtzeit bei 50 km/h Stadtdurchschnitt */
  _fallbackAbschnitt(von, nach){
    const luft=Geo.distanz(von&&von.lat, von&&von.lng, nach&&nach.lat, nach&&nach.lng);
    if(luft==null) return null;
    const km=Math.round(luft*1.3*10)/10;
    return { km, min:Math.round(km/50*60) };
  },

  /* Nearest-Neighbor auf einer NxN-Matrix (Dauern in Sekunden ODER Distanzen).
     Gibt Besuchsreihenfolge der Indizes zurück (ohne Start). null = unerreichbar. */
  _nearestNeighbor(matrix, startIdx){
    const n=matrix.length, besucht=new Set([startIdx]), folge=[];
    let akt=startIdx;
    while(besucht.size<n){
      let best=-1, bestW=Infinity;
      for(let j=0;j<n;j++){
        if(besucht.has(j)) continue;
        const w=matrix[akt][j];
        if(w!=null && w<bestW){ bestW=w; best=j; }
      }
      if(best<0){ for(let j=0;j<n;j++) if(!besucht.has(j)){ best=j; break; } }  // Notnagel bei null-Zellen
      folge.push(best); besucht.add(best); akt=best;
    }
    return folge;
  },

  /* Route über alle Stops berechnen: OSRM Table API (1 Call, 5 s Timeout),
     sonst Haversine-Fallback. → {abschnitte, rueckweg, osrmGenutzt}
     abschnitte[i] = {einrichtungName, km, min, lat, lng} in FAHR-Reihenfolge,
     km/min jeweils VOM Vorgänger (bzw. Startpunkt). */
  async routeBerechnen(stopNamen, start){
    const punkte=[{lat:start.lat, lng:start.lng}];
    for(const nm of stopNamen){
      const e=Einrichtungen.finden(nm);
      punkte.push(e&&e.lat!=null&&e.lng!=null ? {lat:e.lat, lng:e.lng} : null);
    }
    let dur=null, dist=null, osrmGenutzt=false;
    if(punkte.every(p=>p) && typeof fetch!=="undefined"){
      try{
        const coords=punkte.map(p=>p.lng+","+p.lat).join(";");
        const url="https://router.project-osrm.org/table/v1/driving/"+coords+"?annotations=duration,distance";
        const ctrl=new AbortController(); const timer=setTimeout(()=>ctrl.abort(),5000);
        const res=await fetch(url,{signal:ctrl.signal, headers:{Accept:"application/json"}});
        clearTimeout(timer);
        if(res.ok){
          const js=await res.json();
          if(js && js.code==="Ok" && js.durations && js.distances){ dur=js.durations; dist=js.distances; osrmGenutzt=true; }
        }
      }catch(_){ /* Timeout/offline → Fallback */ }
    }
    if(!osrmGenutzt){
      const n=punkte.length; dur=[]; dist=[];
      for(let i=0;i<n;i++){ dur[i]=[]; dist[i]=[];
        for(let j=0;j<n;j++){
          if(i===j){ dur[i][j]=0; dist[i][j]=0; continue; }
          const f=(punkte[i]&&punkte[j]) ? this._fallbackAbschnitt(punkte[i],punkte[j]) : null;
          dur[i][j]=f ? f.min*60 : null; dist[i][j]=f ? f.km*1000 : null;
        }
      }
    }
    const folge=this._nearestNeighbor(dur,0);
    const abschnitte=[]; let vor=0;
    for(const idx of folge){
      abschnitte.push({ einrichtungName:stopNamen[idx-1],
        km:  dist[vor][idx]!=null ? Math.round(dist[vor][idx]/100)/10 : null,
        min: dur[vor][idx]!=null  ? Math.round(dur[vor][idx]/60)      : null,
        lat: punkte[idx]?punkte[idx].lat:null, lng: punkte[idx]?punkte[idx].lng:null });
      vor=idx;
    }
    const rueckweg={ km:  dist[vor][0]!=null ? Math.round(dist[vor][0]/100)/10 : null,
                     min: dur[vor][0]!=null  ? Math.round(dur[vor][0]/60)      : null };
    // v0.19: Echte Straßengeometrie für die Kartendarstellung über die OSRM Route API (überview=full).
    // Reihenfolge steht durch nearest-neighbor fest: Start → Stops (in Fahrfolge) → zurück zum Start.
    // Nur wenn die Matrix (Table API) bereits echte Daten lieferte; sonst bleibt geometrie=null (→ Luftlinie).
    let geometrie=null;
    if(osrmGenutzt && punkte.every(p=>p) && typeof fetch!=="undefined"){
      try{
        const reihenfolge=[0, ...folge, 0];
        const coords=reihenfolge.map(i=>punkte[i].lng+","+punkte[i].lat).join(";");
        const url="https://router.project-osrm.org/route/v1/driving/"+coords+"?overview=full&geometries=geojson";
        const ctrl=new AbortController(); const timer=setTimeout(()=>ctrl.abort(),5000);
        const res=await fetch(url,{signal:ctrl.signal, headers:{Accept:"application/json"}});
        clearTimeout(timer);
        if(res.ok){
          const js=await res.json();
          const co=js && js.routes && js.routes[0] && js.routes[0].geometry && js.routes[0].geometry.coordinates;
          if(Array.isArray(co) && co.length>1) geometrie=co.map(p=>({lat:p[1], lng:p[0]}));
        }
      }catch(_){ /* Route API nicht erreichbar → Kartenlinie fällt auf Luftlinie zurück */ }
    }
    return { abschnitte, rueckweg, osrmGenutzt, geometrie };
  },

  /* v0.19: Nur die Straßengeometrie einer bereits festgelegten Punktfolge (OSRM Route API) – für die
     Darstellung gespeicherter Touren, deren Reihenfolge nicht neu optimiert werden soll. → [{lat,lng}] | null */
  async streckeGeometrie(punkte){
    const pts=(punkte||[]).filter(p=>p&&p.lat!=null&&p.lng!=null);
    if(pts.length<2 || typeof fetch==="undefined") return null;
    try{
      const coords=pts.map(p=>p.lng+","+p.lat).join(";");
      const url="https://router.project-osrm.org/route/v1/driving/"+coords+"?overview=full&geometries=geojson";
      const ctrl=new AbortController(); const timer=setTimeout(()=>ctrl.abort(),5000);
      const res=await fetch(url,{signal:ctrl.signal,headers:{Accept:"application/json"}});
      clearTimeout(timer);
      if(res.ok){ const js=await res.json();
        const co=js&&js.routes&&js.routes[0]&&js.routes[0].geometry&&js.routes[0].geometry.coordinates;
        if(Array.isArray(co)&&co.length>1) return co.map(p=>({lat:p[1],lng:p[0]}));
      }
    }catch(_){ /* offline → null → Luftlinie */ }
    return null;
  },

  /* Zeitplan: geordnete Abschnitte sequenziell mit Ankunft/Abfahrt versehen.
     geordnet[i] = {einrichtungName, besuche:[{azubiId,idx,azubiName,typ}], km, min}
     → {stops, rueckkehr:"HH:MM", kmGesamt, fahrzeitMinGesamt} (inkl. Rückweg) */
  _zeitplanBerechnen(geordnet, rueckweg, startzeit, besuchDauerMin){
    let t=this._minVon(startzeit), kmGes=0, fahrtGes=0;
    const stops=geordnet.map(g=>{
      const fahrt=g.min||0; t+=fahrt;
      const verweil=Math.max(1,(g.besuche||[]).length)*besuchDauerMin;   // Sammelbesuch: Anzahl × Dauer
      const s={ einrichtungName:g.einrichtungName, besuche:g.besuche||[],
        ankunftGeplant:this._hhmm(t), abfahrtGeplant:this._hhmm(t+verweil),
        verweildauerMin:verweil, kmVomVorigen:g.km!=null?g.km:null, fahrzeitMinVomVorigen:fahrt };
      // v0.19: jedem Besuch die berechnete Stop-Ankunft als Standard-Uhrzeit vorbelegen; im Ergebnis je Azubi editierbar.
      s.besuche.forEach(b=>{ if(b.uhrzeitGeplant==null) b.uhrzeitGeplant=s.ankunftGeplant; });
      kmGes+=(g.km||0); fahrtGes+=fahrt; t+=verweil;
      return s;
    });
    const rMin=(rueckweg&&rueckweg.min)||0, rKm=(rueckweg&&rueckweg.km)||0;
    kmGes+=rKm; fahrtGes+=rMin;
    return { stops, rueckkehr:this._hhmm(t+rMin),
      kmGesamt:Math.round(kmGes*10)/10, fahrzeitMinGesamt:Math.round(fahrtGes) };
  },

  /* Warnungen (Spec §7.3): Kollision, Engpass < 20 min, langer Tag > 8 h.
     Nicht blockierend – Speichern bleibt möglich. */
  _warnungenPruefen(plan, startzeit, datum, azubis){
    const w=[];
    const eigene=new Set();
    plan.stops.forEach(s=>s.besuche.forEach(b=>eigene.add(b.azubiId+":"+b.idx)));
    for(const s of plan.stops){
      const ank=this._minVon(s.ankunftGeplant);
      for(const b of s.besuche){
        const a=(azubis||[]).find(x=>x.id===b.azubiId); if(!a) continue;
        (a.einsaetze||[]).forEach((e,idx)=>{
          if(eigene.has(b.azubiId+":"+idx)) return;                    // Termine dieser Tour selbst ignorieren
          if(e.besuchStatus!=="geplant" || e.besuchDatum!==datum || !e.besuchUhrzeit) return;
          const tz=this._minVon(e.besuchUhrzeit);
          if(tz!=null && Math.abs(tz-ank)<=s.verweildauerMin)
            w.push(`Terminüberschneidung: ${b.azubiName||b.azubiId} – bestehender Termin ${e.besuchUhrzeit} Uhr`);
        });
      }
    }
    plan.stops.forEach((s,i)=>{
      if(i>0 && s.fahrzeitMinVomVorigen<20)
        w.push(`Wenig Puffer vor ${s.einrichtungName} (${s.fahrzeitMinVomVorigen} min)`);
    });
    const start=this._minVon(startzeit), ende=this._minVon(plan.rueckkehr);
    if(start!=null && ende!=null && (ende-start)>480)
      w.push("Gesamtdauer über 8 Stunden – Pause einplanen?");
    return w;
  },

  /* v0.18: max. Anzahl Azubis gleichzeitig an einer Einrichtung (Einstellungen, 2–5, Default 3) */
  maxSammelGroesse(){
    return Math.max(2,Math.min(5,parseInt(Daten.state.maxSammelGroesse,10)||3));
  },
  /* v0.18: Array in Häppchen von max. `size` Einträgen zerlegen (Reihenfolge bleibt erhalten) */
  _chunk(arr,size){
    const out=[]; for(let i=0;i<arr.length;i+=size) out.push(arr.slice(i,i+size)); return out;
  },
  /* Auswählbare Stops für den Tour-Builder: anstehende, NICHT überfällige Besuche.
     v0.18: Bereits bestätigte Termine (Status "geplant") sind NICHT mehr auswählbar – ein abgesprochener
     Termin darf nicht durch eine neue Tour überschrieben werden. Sie werden stattdessen als Info
     ("fixiert") an die Option derselben Einrichtung angehängt, damit ein zweiter, noch offener Azubi
     erkennbar gemeinsam mit dem bestätigten Termin besucht werden kann.
     Markierte Sammelbesuche (gemeinsame sammelbesuchId) erscheinen als EIN Eintrag, der Rest gebündelt
     je Einrichtung – beides auf maxSammelGroesse() gedeckelt (bei Überschreitung mehrere Optionen statt
     einer). Ohne Koordinaten → nicht planbar (gesperrt). */
  stopOptionen(zieldatum){
    const alle=Anstehend.sammeln(zieldatum).filter(e=>e.gruppe!=="ueberfaellig");
    const eintraege=alle.filter(e=>e.gruppe==="abstimmen" || e.gruppe==="kein");
    const fixiert  =alle.filter(e=>e.gruppe==="diesewoche" || e.gruppe==="geplant");
    const fixProEinr={};
    for(const e of fixiert) (fixProEinr[e.einrichtungName]=fixProEinr[e.einrichtungName]||[]).push(e);
    const max=this.maxSammelGroesse();
    const opts=[], benutzt=new Set(), proSb={};
    for(const e of eintraege){
      const s=this._einsatzVon(e);
      if(s && s.sammelbesuchId) (proSb[s.sammelbesuchId]=proSb[s.sammelbesuchId]||[]).push(e);
    }
    for(const sb in proSb){
      const es=proSb[sb];
      if(es.length<2) continue;                       // Rest ohne Partner → normale Behandlung
      this._chunk(es,max).forEach(ch=>{
        ch.forEach(e=>benutzt.add(e.azubiId+":"+e.idx));
        opts.push(this._stopOption(ch, ch.length>=2));
      });
    }
    const proEinr={};
    for(const e of eintraege){
      if(benutzt.has(e.azubiId+":"+e.idx)) continue;
      (proEinr[e.einrichtungName]=proEinr[e.einrichtungName]||[]).push(e);
    }
    Object.keys(proEinr).sort((a,b)=>a.localeCompare(b,"de")).forEach(nm=>{
      this._chunk(proEinr[nm],max).forEach(ch=>opts.push(this._stopOption(ch, false)));
    });
    opts.forEach(o=>{ o.fixiert = o.einrichtungen.flatMap(nm=>fixProEinr[nm]||[]); });
    return opts;
  },
  /* v0.18: prüft, ob das Zuwählen von kandidatId die Kapazitätsgrenze (maxSammelGroesse) an einer der
     betroffenen Einrichtungen überschreiten würde – zählt bereits gewählte Opts UND fixierte (bereits
     bestätigte) Termine mit. Nicht blockierend geprüfte Optionen selbst sind wegen stopOptionen() nie
     größer als das Limit; hier geht es um die Kombination mehrerer Auswahl-Häppchen an derselben Adresse. */
  kapazitaetPruefen(gewaehltIds, opts, kandidatId){
    const max=this.maxSammelGroesse();
    const kandidat=opts.find(o=>o.id===kandidatId); if(!kandidat) return {ok:true};
    for(const nm of kandidat.einrichtungen){
      let summe=kandidat.eintraege.filter(e=>e.einrichtungName===nm).length;
      summe+=(kandidat.fixiert||[]).filter(f=>f.einrichtungName===nm).length;
      for(const o of opts){
        if(o.id===kandidat.id || !gewaehltIds.has(o.id)) continue;
        summe+=o.eintraege.filter(e=>e.einrichtungName===nm).length;
      }
      if(summe>max) return {ok:false, einrichtung:nm, max};
    }
    return {ok:true};
  },
  _stopOption(es, sammel){
    const einrichtungen=[...new Set(es.map(e=>e.einrichtungName))];
    const koordOk=einrichtungen.every(nm=>{
      const x=Einrichtungen.finden(nm);
      return x && x.lat!=null && x.lng!=null && this.inNRW(x.lat,x.lng);
    });
    const id="opt:"+es.map(e=>e.azubiId+":"+e.idx).sort().join("|");
    return { id, sammel, einrichtungen, eintraege:es, koordOk };
  },

  /* Tour speichern: Datenmodell §7.1; Status-Setzung §7.4 (geplant + Datum + Ankunft).
     v0.18: bisheriger Zustand je Einsatz wird auf dem Stop-Eintrag gesichert (vorherStatus/-Datum/-Uhrzeit),
     damit Touren.loeschen ihn wiederherstellen kann. Bereits bestätigte Termine (Status "geplant") können
     an dieser Stelle gar nicht mehr auftauchen – Touren.stopOptionen bietet sie seit v0.18 nicht mehr an. */
  async speichern(tour){
    Daten.state.touren.push(tour);
    for(const s of tour.stops) for(const b of s.besuche){
      const a=Azubis.alle().find(x=>x.id===b.azubiId); if(!a) continue;
      const e=a.einsaetze[b.idx]; if(!e) continue;
      b.vorherStatus=e.besuchStatus; b.vorherDatum=e.besuchDatum; b.vorherUhrzeit=e.besuchUhrzeit;
      // v0.19: individuell je Azubi gesetzte Uhrzeit hat Vorrang vor der berechneten Stop-Ankunft.
      e.besuchStatus="geplant"; e.besuchDatum=tour.datum; e.besuchUhrzeit=b.uhrzeitGeplant||s.ankunftGeplant;
      a.aktualisiertAm=new Date().toISOString();
    }
    await Daten.speichern("Tour gespeichert – Besuche auf »geplant« gesetzt");
  },
  /* Tour löschen (v0.18): setzt betroffene Einsätze auf den Zustand VOR dem Speichern zurück.
     Sicherheitsbedingung: nur zurücksetzen, wenn der Termin seit dem Speichern nicht anderweitig
     verändert wurde (z.B. im Azubi-Tab manuell auf "durchgeführt" gesetzt) – sonst bleibt er unberührt. */
  async loeschen(tourId){
    const i=Daten.state.touren.findIndex(t=>t.id===tourId);
    if(i<0) return false;
    const tour=Daten.state.touren[i];
    for(const s of tour.stops) for(const b of s.besuche){
      const a=Azubis.alle().find(x=>x.id===b.azubiId); if(!a) continue;
      const e=a.einsaetze[b.idx]; if(!e) continue;
      // v0.19: gegen die tatsächlich beim Speichern geschriebene Uhrzeit prüfen (individuelle Uhrzeit oder Stop-Ankunft).
      const gesetzteUhr=b.uhrzeitGeplant||s.ankunftGeplant;
      if(e.besuchStatus==="geplant" && e.besuchDatum===tour.datum && e.besuchUhrzeit===gesetzteUhr){
        e.besuchStatus = b.vorherStatus!==undefined ? b.vorherStatus : "offen";
        e.besuchDatum  = b.vorherDatum !==undefined ? b.vorherDatum  : null;
        e.besuchUhrzeit= b.vorherUhrzeit!==undefined ? b.vorherUhrzeit : null;
        a.aktualisiertAm=new Date().toISOString();
      }
    }
    Daten.state.touren.splice(i,1);
    await Daten.speichern("Tour gelöscht – Termine zurückgesetzt");
    return true;
  },
  alle(){
    return (Daten.state.touren||[]).slice().sort((a,b)=>
      (b.datum||"").localeCompare(a.datum||"") || (b.startzeit||"").localeCompare(a.startzeit||""));
  }
};

/* ---------- Einstellungen: Privatadresse verorten (v0.17) -------------
   Geocodiert die private Startadresse on-demand über Nominatim und cacht
   lat/lng DIREKT im privatAdresse-Objekt (beim Neu-Speichern der Adresse
   wird der Cache automatisch verworfen, weil ein frisches Objekt entsteht). */
const Einstellungen = {
  async privatAdresseVerorten(){
    const a=Daten.state.privatAdresse;
    if(!a || !(a.strasse||a.plz||a.ort)) return {ok:false, grund:"keine Adresse"};
    const r=await Geo.einzeln({strasse:a.strasse, plz:a.plz, ort:a.ort});
    if(!r) return {ok:false, grund:"nicht gefunden"};
    a.lat=r.lat; a.lng=r.lng;
    await Daten.speichern("Privatadresse verortet", true);
    return {ok:true};
  }
};

/* ---------- ImportExport ---------------------------------------------- */
const ImportExport = {
  /* Hauptaktion: vollständigen Stand als [meinName].json herunterladen.
     Im Speichern-Dialog navigiert die Lehrkraft selbst in den gemeinsamen NAS-Ordner.
     (Automatisches Ordner-Schreiben ist in der Citrix-/file://-Umgebung gesperrt.) */
  async termineExportieren(){
    const stamm=dateinameVonLabel(Daten.state.geraet);
    if(!stamm){ Oberflaeche.toast("Bitte zuerst oben unter „Mein Name“ einen Namen eintragen.",true); return; }
    const dateiname=stamm+".json";
    const blob=new Blob([JSON.stringify(Daten.state,null,2)],{type:"application/json"});
    this._download(blob,dateiname);
    Daten.state.exportAusstehend=false;
    await Daten.speichern("Export erstellt: "+dateiname+" – im Speichern-Dialog in den NAS-Ordner legen.", true);
    Oberflaeche.render();
  },
  async importDatei(file){
    try{
      const text=await file.text(); const obj=JSON.parse(text);
      Merge.vollMerge(obj); await Daten.speichern("Import zusammengeführt"); Oberflaeche.render();
    }catch(e){ Oberflaeche.toast("Import fehlgeschlagen: "+e.message,true); }
  },
  _download(blob,name){
    const u=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u);
  }
};

/* ====================== Kalender (Einsatz-Zeitleiste, Gantt) ============
   Reine Rechenlogik + HTML-Erzeugung. Datumsbasiert (UTC, ganze Tage),
   Balken in % relativ zum Fenster -> kein DOM-Messen nötig, headless testbar.
   ===================================================================== */
const Kalender = {
  MONATE: ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"],

  /* ---- Datum-Helfer (UTC) ---- */
  _d(iso){ return new Date(iso+"T00:00:00Z"); },
  _iso(d){ return d.toISOString().slice(0,10); },
  _plusTage(iso,n){ const d=this._d(iso); d.setUTCDate(d.getUTCDate()+n); return this._iso(d); },
  _tageDiff(aISO,bISO){ return Math.round((this._d(bISO)-this._d(aISO))/86400000); }, // b−a in Tagen

  /* ---- Fenster [start, ende) je Zoomstufe; ende = erster Tag NACH dem Fenster ---- */
  fenster(zoom, ankerISO){
    const d=this._d(ankerISO), y=d.getUTCFullYear(), m=d.getUTCMonth();
    if(zoom==="monat")   return {start:this._iso(new Date(Date.UTC(y,m,1))),   ende:this._iso(new Date(Date.UTC(y,m+1,1)))};
    if(zoom==="quartal"){ const q=Math.floor(m/3)*3;
                          return {start:this._iso(new Date(Date.UTC(y,q,1))),  ende:this._iso(new Date(Date.UTC(y,q+3,1)))}; }
    return                       {start:this._iso(new Date(Date.UTC(y,0,1))),  ende:this._iso(new Date(Date.UTC(y+1,0,1)))};
  },

  /* ---- Blättern um genau eine Einheit (richtung −1 / +1) ---- */
  blaettern(zoom, ankerISO, richtung){
    const d=this._d(ankerISO), y=d.getUTCFullYear(), m=d.getUTCMonth();
    if(zoom==="monat")   return this._iso(new Date(Date.UTC(y, m+richtung, 1)));
    if(zoom==="quartal") return this._iso(new Date(Date.UTC(y, Math.floor(m/3)*3 + 3*richtung, 1)));
    return                      this._iso(new Date(Date.UTC(y+richtung, 0, 1)));
  },

  /* ---- Balkengeometrie in % (relativ zum Fenster); null = kein Überlapp ----
     bis ist INKLUSIV (letzter Einsatztag), daher exklusives Ende = bis+1. */
  geometrie(vonISO, bisISO, fenster){
    const gesamt=this._tageDiff(fenster.start, fenster.ende);
    const bStart    = vonISO > fenster.start ? vonISO : fenster.start;
    const bEndeExkl = this._plusTage(bisISO, 1);
    const bEnde     = bEndeExkl < fenster.ende ? bEndeExkl : fenster.ende;
    const breiteTage = this._tageDiff(bStart, bEnde);
    if(breiteTage <= 0) return null;
    return { leftPct: this._tageDiff(fenster.start, bStart)/gesamt*100,
             widthPct: breiteTage/gesamt*100 };
  },

  /* ---- Position der Heute-Linie in % (null = außerhalb des Fensters) ---- */
  heutePct(fenster, heuteISO){
    if(heuteISO < fenster.start || heuteISO >= fenster.ende) return null;
    const gesamt=this._tageDiff(fenster.start, fenster.ende);
    return (this._tageDiff(fenster.start, heuteISO)+0.5)/gesamt*100;
  },

  /* ---- Rasterpunkte {pct, breitePct, label, wochenende?} ---- */
  raster(zoom, fenster){
    const gesamt=this._tageDiff(fenster.start, fenster.ende), p=[];
    if(zoom==="monat"){
      for(let t=0;t<gesamt;t++){ const d=this._d(this._plusTage(fenster.start,t)), wd=d.getUTCDay();
        p.push({pct:t/gesamt*100, breitePct:1/gesamt*100, label:String(d.getUTCDate()), wochenende:(wd===0||wd===6)}); }
    } else if(zoom==="quartal"){
      for(let t=0;t<gesamt;t+=7){ const d=this._d(this._plusTage(fenster.start,t));
        p.push({pct:t/gesamt*100, breitePct:Math.min(7,gesamt-t)/gesamt*100,
                label:String(d.getUTCDate()).padStart(2,"0")+"."+String(d.getUTCMonth()+1).padStart(2,"0")+"."}); }
    } else {
      let cur=fenster.start;
      while(cur<fenster.ende){ const d=this._d(cur);
        const naechster=this._iso(new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth()+1, 1)));
        const bis=naechster<fenster.ende?naechster:fenster.ende;
        p.push({pct:this._tageDiff(fenster.start,cur)/gesamt*100,
                breitePct:this._tageDiff(cur,bis)/gesamt*100, label:this.MONATE[d.getUTCMonth()]});
        cur=naechster; }
    }
    return p;
  },

  /* ---- Überschrift des aktuellen Fensters ---- */
  fensterLabel(zoom, fenster){
    const d=this._d(fenster.start), y=d.getUTCFullYear(), m=d.getUTCMonth();
    if(zoom==="monat")   return this.MONATE[m]+" "+y;
    if(zoom==="quartal") return "Q"+(Math.floor(m/3)+1)+" "+y;
    return String(y);
  },

  /* ---- Track-Breite in px je Zoom (genug Platz fürs Raster) ---- */
  trackBreite(zoom, fenster){
    const tage=this._tageDiff(fenster.start, fenster.ende);
    const proTag = zoom==="monat" ? 34 : zoom==="quartal" ? 12 : 3.2;
    return Math.max(720, Math.round(tage*proTag));
  }
};

const Oberflaeche = {

  azubiAnsicht:"liste",     // "liste" | "kalender" (Umschalter im Azubi-Tab)
  kalZoom:"quartal",        // "monat" | "quartal" | "jahr"
  kalAnker:null,            // Ankerdatum (ISO); null = heutiges Fenster
  kalKurseZu:new Set(),     // zugeklappte Kursköpfe (Default: alle offen)
  init(){
    document.querySelectorAll("nav button").forEach(b=>{
      b.onclick=()=>{ this.tab=b.dataset.tab;
        document.querySelectorAll("nav button").forEach(x=>x.classList.toggle("aktiv",x===b));

  },
  standAnzeigen(){
    const t=Daten.state&&Daten.state.aktualisiertAm;
    document.getElementById("standAnzeige").textContent = t? "Stand: "+new Date(t).toLocaleString("de-DE") : "";
    this.exportHinweisAktualisieren();
  },
  /* Orangefarbener Punkt am Einstellungen-Tab, solange Änderungen seit letztem Export offen sind. */
  exportHinweisAktualisieren(){
    const b=document.querySelector('nav button[data-tab="einstellungen"]');
    if(b) b.classList.toggle("hat-hinweis", !!(Daten.state&&Daten.state.exportAusstehend));
  },
  toast(msg,fehler){
    const t=document.getElementById("toast"); t.textContent=msg;
    t.className="toast zeig"+(fehler?" fehler":""); clearTimeout(this._tt);
    this._tt=setTimeout(()=>t.className="toast",fehler?4500:2200);
  },
  modal(html){
    document.getElementById("modal").innerHTML=html;
    document.getElementById("modalBg").classList.add("offen");
  },
  modalZu(){ document.getElementById("modalBg").classList.remove("offen"); },

  /* v0.19: Feedback-/Bug-Meldung. Wird in state.meldungen[] gespeichert und beim Export automatisch
     mit in die JSON geschrieben – das Dashboard kann die Meldungen aller Kolleg:innen anzeigen. */
  feedbackFormular(){
    const kats=[["fehler","Fehler"],["wunsch","Wunsch"],["frage","Frage"]];
    const segs=kats.map((k,i)=>`<label class="seg"><input type="radio" name="fbKat" value="${k[0]}" ${i===0?"checked":""}> ${k[1]}</label>`).join("");
    const wer=Daten.state.geraet||"";
    this.modal(`<h3>Feedback an Christian</h3>
      <div class="meta" style="margin-bottom:10px">Deine Meldung wird beim nächsten Export mitgesichert und erscheint im Dashboard. Kein Versand per E-Mail.</div>
      <div class="feld"><label>Art</label><div class="seg-reihe">${segs}</div></div>
      <div class="feld"><label>Beschreibung</label>
        <textarea id="fbText" rows="4" placeholder="Was ist passiert bzw. was wünschst du dir?" style="font:inherit;padding:6px 8px;border:1px solid var(--rahmen);border-radius:6px;resize:vertical"></textarea></div>
      <div class="meta">Absender: <b>${wer?esc(wer):"(kein Name hinterlegt – bitte in den Einstellungen eintragen)"}</b></div>

        <button onclick="Oberflaeche.modalZu()">Abbrechen</button>

        id:"m-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,6),

    }
    el.innerHTML=html;
    this._verdrahten();
    if(this.tab==="touren") this._tourenInit();
  },

  /* ---- Anstehende Besuche ---- */
  viewAnstehend(){
    const heute=Anstehend._heute();
    const alle=Anstehend.sammeln();
    const reihenfolge=["ueberfaellig","diesewoche","geplant","abstimmen","kein"];
    const titel={ueberfaellig:"Überfällig",diesewoche:"Diese Woche",geplant:"Geplant (später)",abstimmen:"Noch abstimmen (vorläufig)",kein:"Noch kein Termin"};
    if(alle.length===0){
      return `<div class="spalte" style="grid-column:1/-1">
        <h2>Anstehende Besuche</h2>
        <div class="meta" style="margin-bottom:10px">Stand heute: ${fmtDatum(heute)}</div>
        <div class="leer">Alles erledigt ✓ – überfällige, diese Woche anstehende, noch abzustimmende
          oder terminlose Pflichtbesuche erscheinen hier automatisch.</div></div>`;
    }
    const sektionen=reihenfolge.filter(b=>alle.some(e=>e.gruppe===b)).map(b=>{
      const eintr=alle.filter(e=>e.gruppe===b).sort((x,y)=>{
        if(x.letzteChance!==y.letzteChance) return x.letzteChance?-1:1;   // letzte Chance zuerst
        // „Noch kein Termin" nach Einsatz-Ende (dringendste zuerst), sonst nach Besuchsdatum
        const kx=b==="kein"?x.bis:(x.datum||x.bis), ky=b==="kein"?y.bis:(y.datum||y.bis);
        return kx.localeCompare(ky);
      });
      return `<div class="anstehend-sektion">
        <div class="anstehend-kopf akopf-${b}"><span class="ak-ico"></span><span>${titel[b]}</span><span class="anzahl">${eintr.length}</span></div>
        <div class="av-grid">${eintr.map(e=>this._anstehendKarte(e)).join("")}</div></div>`;
    }).join("");
    return `<div class="spalte" style="grid-column:1/-1">
      <h2>Anstehende Besuche</h2>
      <div class="meta" style="margin-bottom:14px">Stand heute: ${fmtDatum(heute)} · ${alle.length} offen</div>
      ${sektionen}</div>`;
  },
  _initialen(nm){
    const teile=(nm||"").trim().split(/\s+/).filter(Boolean);
    if(teile.length===0) return "?";
    if(teile.length===1) return teile[0].slice(0,2).toUpperCase();
    return (teile[0][0]+teile[teile.length-1][0]).toUpperCase();
  },
  /* Datums-/Statuszeile je Gruppe (Mockup-Wortlaut) */
  _terminText(e){
    if(e.gruppe==="ueberfaellig"){
      if(e.status==="nachzuholen") return e.datum?`nachzuholen – Termin war ${Anstehend._kurz(e.datum)}`:"nachzuholen";
      if(e.datum && e.datum<Anstehend._heute()) return `Termin war ${Anstehend._kurz(e.datum)}`;
      return "Besuch fehlt – Einsatz beendet";
    }
    if(e.gruppe==="diesewoche") return `${Anstehend._kurz(e.datum)}${e.uhrzeit?` · ${e.uhrzeit}`:""}`;
    if(e.gruppe==="geplant")    return `${Anstehend._kurz(e.datum)}${e.uhrzeit?` · ${e.uhrzeit}`:""}`;
    if(e.gruppe==="abstimmen")  return `${Anstehend._kurz(e.datum)} (vorläufig)`;
    return "Kein Datum";
  },
  _anstehendKarte(e){
    const nm=Azubis.name(e.azubiId)||e.azubiId;
    const datTxt=this._terminText(e);
    const letzte=e.letzteChance?`<span class="av-letzte" title="Letzte verbleibende Gelegenheit für diesen Pflichttyp – wird sie versäumt, bleibt der Typ offen.">⚠ letzter Einsatz dieses Typs</span>`:"";
    return `<div class="av-karte av-${e.gruppe}" data-anst-azubi="${e.azubiId}" data-anst-idx="${e.idx}" title="Besuch planen / bearbeiten">
      <div class="av-kreis" aria-hidden="true">${this._initialen(nm)}</div>
      <div class="av-kname">${nm}</div>
      <div class="av-ksub">${e.einrichtungName} · ${e.typ}</div>
      <div class="av-kdat">${KD_ICO}<span>${datTxt}</span></div>
      ${letzte}
    </div>`;
  },

  /* ---- Azubis ---- */
  viewAzubis(){
    const umschalter=`<div class="seg-knopf" id="azubiAnsichtUmschalter">
        <button data-ansicht="liste" class="${this.azubiAnsicht==='liste'?'an':''}">Liste</button>
        <button data-ansicht="kalender" class="${this.azubiAnsicht==='kalender'?'an':''}">Kalender</button>
      </div>`;

      const f=Azubis.fortschritt(a); const nm=Azubis.name(a.id);
