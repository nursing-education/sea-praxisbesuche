<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SEA Praxisbesuche</title>
<style>
  /* SEA-Token als Basis – in Claude Design überschreibbar */
  :root{
    --bg:#F4F1EB; --flaeche:#FFFFFF; --sekundaer:#EDE9DF;
    --text:#1A1A1A; --text-leise:#4A4845; --rahmen:#DDD8CB;
    --navy:#104E64; --orange:#F05100; --gold:#FCBD20;
    --forest:#3E6B47; --danger:#C73E47;
    --radius:8px; --sp:12px;
    --font:system-ui, "Segoe UI", sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--text);background:var(--bg);font-size:15px;line-height:1.45}
  button{font:inherit;cursor:pointer;border:1px solid var(--rahmen);background:var(--flaeche);color:var(--text);
    padding:7px 12px;border-radius:var(--radius)}
  button:hover{border-color:var(--navy)}
  button.primaer{background:var(--navy);color:#fff;border-color:var(--navy)}
  button.aktion{background:var(--orange);color:#fff;border-color:var(--orange)}
  button.gefahr{color:var(--danger);border-color:var(--danger)}
  input,select{font:inherit;padding:6px 8px;border:1px solid var(--rahmen);border-radius:6px;background:var(--flaeche);color:var(--text)}
  label{font-size:13px;color:var(--text-leise)}
  a{color:var(--navy)}

  header{background:var(--navy);color:#fff;padding:10px 18px;display:flex;align-items:center;gap:16px}
  header h1{font-size:17px;margin:0;font-weight:600}
  header .stand{font-size:12px;opacity:.8;margin-left:auto}
  header .ver{font-size:11px;opacity:.7;font-weight:400;padding:1px 7px;border:1px solid rgba(255,255,255,.35);border-radius:999px}

  nav{display:flex;gap:4px;padding:8px 18px;background:var(--sekundaer);border-bottom:1px solid var(--rahmen)}
  nav button{position:relative;background:transparent;border:none;padding:8px 14px;border-radius:6px;color:var(--text-leise)}
  nav button.aktiv{background:var(--flaeche);color:var(--navy);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.06)}
  nav button.hat-hinweis::after{content:"";position:absolute;top:5px;right:6px;width:7px;height:7px;
    border-radius:50%;background:var(--orange);box-shadow:0 0 0 2px var(--sekundaer)}

  .export-banner{display:flex;align-items:center;gap:12px;background:#FFF4D6;border:1px solid var(--gold);
    border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:14px}
  .export-banner .meta{font-size:12px;color:var(--text-leise)}
  .export-sticky{grid-column:1/-1;position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:10px;
    min-height:40px;background:#FFF3CD;border-bottom:2px solid var(--orange);
    padding:6px 14px;margin:-18px -18px 14px;font-size:13.5px;color:#7a4a00}
  .export-sticky button{margin-left:auto;background:var(--orange);color:#fff;border-color:var(--orange);padding:4px 12px}

  main{display:grid;grid-template-columns:340px 1fr;gap:18px;padding:18px;max-width:1280px;margin:0 auto;align-items:start}
  .spalte{background:var(--flaeche);border:1px solid var(--rahmen);border-radius:var(--radius);padding:14px}
  .spalte h2{font-size:14px;margin:0 0 10px;color:var(--navy);text-transform:uppercase;letter-spacing:.04em}
  .leer{color:var(--text-leise);font-size:14px;padding:8px 0}

  .zeile{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--rahmen);border-radius:6px;margin-bottom:6px;background:var(--flaeche)}
  .zeile:hover{border-color:var(--navy)}
  .zeile .haupt{font-weight:600}
  .zeile .meta{font-size:12px;color:var(--text-leise)}
  .zeile .rechts{margin-left:auto;display:flex;gap:6px;align-items:center}
  .pill{font-size:11px;padding:2px 7px;border-radius:999px;background:var(--sekundaer);color:var(--text-leise)}
  .pill.Akut{background:#dde9ee;color:var(--navy)} .pill.LZP{background:#e3ede4;color:var(--forest)}
  .pill.Amb{background:#fdeede;color:#9a5b00} .pill.Päd{background:#fbe8c2;color:#7a5a00}
  .pill.Psych{background:#efe2ee;color:#6a3a66} .pill.WE{background:#ececec;color:#555}
  .pill.OE,.pill.VE{background:var(--navy);color:#fff}
  .pill.stamm{background:var(--gold);color:#5a4500;font-weight:600}
  .stamm-row td{background:#fffaf0}
  .pill.fehlt{background:#fbe1e3;color:var(--danger)}

  /* Einsatztyp-Dropdown im Azubi-Detail: farbiger linker Rand nach Bereich */
  select.typsel{font-weight:600;border-left-width:4px}
  select.typsel.Akut,select.typsel.OE,select.typsel.VE{border-left-color:var(--navy)}
  select.typsel.LZP{border-left-color:var(--forest)}
  select.typsel.Amb{border-left-color:#9a5b00}
  select.typsel.Päd{border-left-color:#7a5a00}
  select.typsel.Psych{border-left-color:#6a3a66}
  select.typsel.WE{border-left-color:#555}

  /* Besuch-Status-Badges (Lebenslauf) – SEA-Farben */
  .bstatus{font-size:11px;padding:2px 9px;border-radius:999px;font-weight:600;text-transform:capitalize;white-space:nowrap}
  .b-offen{background:var(--sekundaer);color:var(--text-leise)}
  .b-geplant{background:#D9E5EA;color:var(--navy)}
  .b-vorläufig{background:#f6e8d2;color:#8a5b15}
  .b-durchgeführt{background:#e3ede4;color:var(--forest)}
  .b-nachzuholen{background:#fbe1e3;color:var(--danger)}
  .b-uebernommen{background:#eef4ef;color:var(--forest);font-style:italic}
  button.winzig{padding:1px 7px;font-size:13px;line-height:1.3}

  /* Einsatz-Tabelle: gleiche Typen verschmelzen zu einem Block (keine Trennung),
     großer Abstand NUR beim Typwechsel – als echte Leerzeile (zuverlässig sichtbar) */
  .einsatztab{border-collapse:separate;border-spacing:0}
  .einsatztab td{border-bottom:none;vertical-align:middle;background-clip:padding-box}
  .einsatztab tbody tr:first-child td{border-top:8px solid transparent}             /* Luft unter dem Kopf */
  .einsatztab tr.typ-luecke td{height:18px;padding:0;border:0;background:transparent;box-shadow:none;font-size:0;line-height:0}
  .einsatztab tr.typ-start td:first-child{border-top-left-radius:7px}               /* Block oben gerundet */
  .einsatztab tr.typ-start td:last-child{border-top-right-radius:7px}
  .einsatztab tr.typ-end td:first-child{border-bottom-left-radius:7px}              /* Block unten gerundet */
  .einsatztab tr.typ-end td:last-child{border-bottom-right-radius:7px}
  .einsatztab tr.erledigt td{opacity:.5}                                            /* erledigter Einsatz ausgegraut */
  .einsatztab tr.row-Akut td{background:#d6e6ee}
  .einsatztab tr.row-OE td,.einsatztab tr.row-VE td{background:#9cc6d4}             /* Stamm-Rahmen: satter, klar von Akut getrennt */
  .einsatztab tr.row-LZP td{background:#dceae0}
  .einsatztab tr.row-Amb td{background:#fbe2cf}
  .einsatztab tr.row-Päd td{background:#f6e4ad}
  .einsatztab tr.row-Psych td{background:#ecdcec}
  .einsatztab tr.row-WE td{background:#e8e8e8}
  /* Status-Auswahl im Besuch-Formular */
  .seg-reihe{display:flex;gap:6px;flex-wrap:wrap}
  .seg{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid var(--rahmen);
    border-radius:999px;cursor:pointer;font-size:13px;text-transform:capitalize}
  .seg input{margin:0}
  .seg:has(input:checked){box-shadow:0 0 0 2px currentColor inset;font-weight:600}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--rahmen);vertical-align:middle}
  /* Prüfschritt: feste Spaltenbreiten -> Dropdowns bleiben in der Box (kein Überlauf rechts) */
  .pruef-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .prueftab{table-layout:fixed}
  .prueftab td,.prueftab th{overflow:hidden}
  .prueftab td:nth-child(2){word-break:break-word}
  .prueftab select{width:100%;max-width:100%;box-sizing:border-box}
  .pill.warn{background:#FDE7C8;color:#8a4b00}
  th{color:var(--text-leise);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em}

  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;
    padding:10px 16px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:2100}
  .toast.zeig{opacity:1}
  .toast.fehler{background:var(--danger)}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;z-index:2000}
  .modal-bg.offen{display:flex}
  .modal{background:var(--flaeche);border-radius:var(--radius);padding:20px;width:100%;max-width:760px}
  .modal h3{margin:0 0 12px;color:var(--navy)}
  .feld{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
  .feld-reihe{display:flex;gap:10px;flex-wrap:wrap}
  .feld-reihe .feld{flex:1;min-width:140px}
  .modal-aktionen{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
  .hinweis{background:var(--sekundaer);border-left:3px solid var(--gold);padding:8px 12px;border-radius:4px;font-size:13px;margin-bottom:12px}
  .neu-mark{background:#fff7e6}
  .unsicher-mark{background:#FDEEDB}
  .hinweis.warn{border-left-color:#C8521E;background:#FDEEDB}
  .pill.vorschlag{background:#F6D9C2;color:#8a3b00;font-weight:600}
  .werkzeug{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
  .werkzeug input[type=search]{flex:1;min-width:160px}

  /* Einstellungen: aufklappbare Sektionen (v0.21) */
  .einst-gruppe{border:1px solid var(--rahmen);border-radius:var(--radius);margin-bottom:10px;background:var(--flaeche);overflow:hidden}
  .einst-gruppe>summary{list-style:none;cursor:pointer;padding:11px 14px;font-size:13px;font-weight:600;color:var(--navy);
    text-transform:uppercase;letter-spacing:.04em;background:var(--sekundaer);display:flex;align-items:center;gap:8px;user-select:none}
  .einst-gruppe>summary::-webkit-details-marker{display:none}
  .einst-gruppe>summary::before{content:"\25B8";font-size:11px;color:var(--text-leise);transition:transform .15s}
  .einst-gruppe[open]>summary::before{transform:rotate(90deg)}
  .einst-gruppe>summary:hover{background:var(--rahmen)}
  .einst-inhalt{padding:14px}
  .spalte .einst-inhalt h2{font-size:13px;margin:16px 0 8px;color:var(--navy);text-transform:none;letter-spacing:0;font-weight:600}
  .spalte .einst-inhalt h2:first-child{margin-top:0}
  /* Einrichtungen: nach Bereich gruppiert, aufklappbar */
  .einr-gruppe{border:1px solid var(--rahmen);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;background:var(--flaeche)}
  .gruppe-kopf{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:none;border-radius:0;
    background:var(--sekundaer);padding:10px 12px}
  .gruppe-kopf:hover{border-color:transparent;background:#e6e1d6}
  .gruppe-kopf .chevron{width:14px;color:var(--text-leise);transition:transform .15s}
  .gruppe-kopf.offen .chevron{transform:rotate(90deg)}
  .gruppe-kopf .anzahl{margin-left:auto;font-size:12px;color:var(--text-leise);font-weight:600}
  .gruppe-body{padding:2px 4px 6px}
  .gruppe-body table{font-size:14px}
  .gruppe-body tbody tr:last-child td{border-bottom:none}
  .treffer{background:#fef7d6}
  mark{background:var(--gold);color:inherit;padding:0 1px;border-radius:2px}

  /* Anstehende Besuche: 4 Status-Gruppen, Block-Karten im Raster (Option A) */
  .anstehend-sektion{margin-bottom:18px}
  .anstehend-kopf{font-size:15px;font-weight:700;color:var(--text);margin:0 0 10px;display:flex;align-items:center;gap:9px}
  .anstehend-kopf .ak-ico{width:13px;height:13px;border-radius:3px;flex:none;display:inline-block;background:var(--text-leise)}
  .anstehend-kopf .anzahl{font-size:13px;font-weight:700;color:var(--text-leise)}
  .akopf-ueberfaellig .ak-ico{background:var(--danger)} .akopf-ueberfaellig .anzahl{color:var(--danger)}
  .akopf-diesewoche  .ak-ico{background:#1D9E75}        .akopf-diesewoche  .anzahl{color:#1D9E75}
  .akopf-geplant     .ak-ico{background:var(--navy)}    .akopf-geplant     .anzahl{color:var(--navy)}
  .akopf-abstimmen   .ak-ico{background:#BA7517}        .akopf-abstimmen   .anzahl{color:#BA7517}
  .akopf-kein        .ak-ico{background:#888780}        .akopf-kein        .anzahl{color:#888780}
  /* Karten-Raster: füllt die Breite, mehrere Karten pro Reihe */
  .av-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .av-karte{position:relative;border:1px solid var(--rahmen);border-left-width:3px;border-radius:8px;
    background:var(--flaeche);padding:14px 16px 13px;cursor:pointer;transition:box-shadow .12s}
  .av-karte:hover{box-shadow:0 2px 10px rgba(0,0,0,.07)}
  .av-kreis{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:13px;background:#e7e6e1;color:#6b6a64;letter-spacing:.02em;margin-bottom:9px}
  .av-kname{font-weight:700;color:var(--navy);font-size:16px;margin-bottom:2px}
  .av-ksub{font-size:13px;color:var(--text-leise);margin-bottom:7px}
  .av-kdat{font-size:13px;display:flex;align-items:center;gap:6px;color:var(--text-leise)}
  .av-kdat .kd-ico{width:14px;height:14px;flex:none}
  .av-letzte{display:inline-block;margin-top:9px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--danger);color:#fff;white-space:nowrap}
  /* Gruppenfarben: linker Akzent + Initialen-Kreis (helle Tönung) + Datumstext */
  .av-ueberfaellig{border-left-color:var(--danger)}   .av-ueberfaellig .av-kreis{background:#f7dcdc;color:var(--danger)}   .av-ueberfaellig .av-kdat{color:var(--danger)}
  .av-diesewoche{border-left-color:#1D9E75}           .av-diesewoche  .av-kreis{background:#d8efe4;color:#157d5b}        .av-diesewoche  .av-kdat{color:#157d5b}
  .av-geplant{border-left-color:var(--navy)}          .av-geplant     .av-kreis{background:#d9e5ea;color:var(--navy)}    .av-geplant     .av-kdat{color:var(--navy)}
  .av-abstimmen{border-left-color:#BA7517}            .av-abstimmen   .av-kreis{background:#f6e6cc;color:#8a5b15}        .av-abstimmen   .av-kdat{color:#8a5b15}
  .av-kein{border-left-color:#888780}                 .av-kein        .av-kreis{background:#e7e6e1;color:#6b6a64}        .av-kein        .av-kdat{color:var(--text-leise)}
  /* „läuft"-Markierung im Azubi-Detail (Besuch-Spalte) */
  .av-jetzt{font-size:10px;font-weight:700;background:var(--orange);color:#fff;padding:1px 6px;border-radius:999px;
    margin-right:5px;text-transform:uppercase;letter-spacing:.03em}

  /* ---- Touren (Leaflet-Karte) ---- */
  .tour-karte{height:60vh;min-height:380px;border:1px solid var(--rahmen);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;background:#e9e7e1;isolation:isolate;position:relative;z-index:0}
  .tour-legende{display:flex;gap:16px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--text-leise);margin-bottom:16px}
  .tour-legende .lg{display:inline-flex;align-items:center;gap:6px}
  .tour-legende .pkt{width:12px;height:12px;border-radius:50%;display:inline-block}
  .tour-panel{padding:0}
  .geo-hinweis{background:#fbf2e2;border:1px solid #e8d6b0;color:#8a5b15;padding:8px 12px;border-radius:6px;margin-bottom:10px;font-size:13px}
  .map-pin{width:26px;height:26px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px}
  .map-pin-offen{border-style:dashed;border-color:#fff}
  .map-popup{font-size:13px;min-width:180px}
  .map-popup hr{border:none;border-top:1px solid var(--rahmen);margin:5px 0}
  .popup-zeile{margin:7px 0}
  .popup-zeile .winzig{margin-top:4px}
  /* v0.16b: Sammelbesuch-Vorschlagspanel */
  .sammel-karte{border:1px solid var(--rahmen);border-left:4px solid var(--text-leise);border-radius:var(--radius);
    padding:8px 10px;margin-bottom:8px;background:var(--flaeche);cursor:pointer;transition:box-shadow .12s,border-color .12s}
  .sammel-karte:hover{border-color:var(--navy)}
  .sammel-karte.stufe-1{border-left-color:var(--navy)}
  .sammel-karte.stufe-2{border-left-color:var(--orange)}
  .sammel-karte.aktiv{box-shadow:0 0 0 2px var(--navy);border-color:var(--navy)}
  .sammel-karte.markiert{background:#f1f6f3}
  .sammel-kopf{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .sammel-kopf>b{font-size:14px}
  .stufe-badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:999px;color:#fff;white-space:nowrap}
  .stufe-badge.stufe-1{background:var(--navy)}
  .stufe-badge.stufe-2{background:var(--orange)}
  .sammel-flag{font-size:12px;color:#1D9E75;font-weight:600}
  .sammel-mark{margin-left:auto}
  .sammel-zeilen{margin-top:6px}
  .sammel-zeile{font-size:13px;padding:2px 0}
  /* v0.17: Layout Option C – Karte fix links (~60 %), Panel rechts scrollbar (~38 %) */
  .tour-layout{display:flex;gap:14px;align-items:stretch;height:calc(100vh - 175px);min-height:480px}
  .tour-links{flex:1 1 60%;min-width:300px;display:flex;flex-direction:column;min-height:0}
  .tour-links .tour-karte{flex:1;height:auto;min-height:0;margin-bottom:8px}
  .tour-links .tour-legende{margin-bottom:0}
  .tour-rechts{flex:0 0 38%;min-width:220px;overflow-y:auto;min-height:0;padding-right:4px}
  .panel-trenn{border:none;border-top:1px solid var(--rahmen);margin:14px 0}
  @media(max-width:720px){
    .tour-layout{display:block;height:auto}
    .tour-links .tour-karte{height:50vh;min-height:320px}
    .tour-rechts{overflow:visible;width:auto;padding-right:0;margin-top:14px}
  }
  /* v0.17: Tour-Builder */
  .tb-stops{border:1px solid var(--rahmen);border-radius:var(--radius);max-height:230px;overflow-y:auto;background:var(--flaeche)}
  .tb-stop{display:flex;gap:8px;align-items:flex-start;padding:6px 8px;border-bottom:1px solid var(--rahmen);font-size:13px;cursor:pointer}
  .tb-stop:last-child{border-bottom:none}
  .tb-stop.gesperrt{opacity:.55;cursor:not-allowed}
  .tb-stop input{margin-top:2px;flex:none}
  .tb-warn{background:#fbf2e2;border:1px solid #e8d6b0;color:#8a5b15;padding:6px 10px;border-radius:6px;margin:6px 0;font-size:13px}
  .tb-tabelle{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
  .tb-tabelle th,.tb-tabelle td{padding:4px 6px;text-align:left;border-bottom:1px solid var(--rahmen);vertical-align:top}
  .tb-tabelle th{font-size:12px;color:var(--text-leise)}
  .tb-tabelle .zahl{text-align:right;white-space:nowrap}
  /* v0.17: Gespeicherte Touren */
  .tour-eintrag{border:1px solid var(--rahmen);border-radius:var(--radius);padding:8px 10px;margin-bottom:8px;background:var(--flaeche);cursor:pointer}
  .tour-eintrag:hover{border-color:var(--navy)}
  .tour-eintrag.aktiv{box-shadow:0 0 0 2px var(--navy);border-color:var(--navy)}
  .tour-eintrag .kopf{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:14px}
  .badge-dfa{font-size:11px;background:#e5e3dd;color:#5b5a55;border-radius:999px;padding:2px 7px;white-space:nowrap}
  .tour-detail{margin-top:6px;font-size:13px}
  .tour-undo{display:flex;align-items:center;gap:10px;background:#fbf2e2;border:1px solid #e8d6b0;border-radius:var(--radius);padding:8px 10px;margin-bottom:8px;font-size:13px}
  /* v0.17: Routen-Marker (nummerierte Stops + Start) */
  .map-stop-nr{width:22px;height:22px;border-radius:50%;background:var(--orange);color:#fff;border:2px solid #fff;
    box-shadow:0 1px 4px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
  .map-stop-start{background:var(--navy);border-radius:5px}
  /* Pin-Highlight: aktive Einrichtungen hervorheben, übrige abdimmen */
  .tour-pin-hot{z-index:1200 !important}

<script>
/* =========================================================================
   SEA Praxisbesuche
   Vanilla JS, deutsche PascalCase-Module. Alle Daten laufen über "Daten".
   ========================================================================= */

const APP_VERSION = "0.21.1"; // Bugfix: SP_CONFIG.scopes Sites.Read.All -> Sites.Selected
const BEREICHE = ["Akut","LZP","Amb","Päd","Psych","WE"];
const TYPEN    = ["OE","PE Akut","PE LZP","PE Amb","PE Päd","PE Psych","VE","WE"];
const STATUS   = ["offen","vorläufig","geplant","durchgeführt","nachzuholen"];
/* Pflichtbereiche, die jeder PFK-Azubi erfüllen muss (WE ist optional) */
const PFLICHT_PFK = ["OE","PE Akut","PE LZP","PE Amb","PE Päd","PE Psych","VE"];
/* Ist ein Einsatz dieses Typs ein Pflichtbesuch?
   PFK: jeder Nicht-WE-Einsatz. PFA: genau die beiden Marker-Typen OE (früh) und VE (Abschluss). */
function istPflicht(ausbildung, typ){
  return ausbildung==="PFA" ? (typ==="OE"||typ==="VE") : (typ!=="WE");
}
/* Typ-Ableitung PFK (v0.15): Lauf-Erkennung mit Stunden-Deckel.
   OE = führender Lauf an der Stammeinrichtung (gedeckelt ~400h, Block voll ab 320h).
   VE = abschließender Lauf an der Stammeinrichtung (gedeckelt ~500h, Block voll ab 400h).
   Mitte = "PE "+Bereich bzw. "WE". Die Stammeinrichtung ergibt sich aus dem ersten Einsatz.
   Funktioniert bei geteilten Blöcken (mehrere CSV-Zeilen je Block) und bei Psych-Stamm:
   PE Psych liegt an der Stammeinrichtung, wird durch den Stunden-Deckel sauber vom VE-Block
   getrennt und erhält über den Bereich automatisch "PE Psych".
   Ohne Stunden (std=0): Fallback positional (1–2 Einträge vorn = OE, letzter Stamm-Einsatz = VE). */
function typAbleitenPFK(eintraege){
  const n=eintraege.length;
  const typ=new Array(n).fill(null);
  if(n===0) return typ;
  const stamm=eintraege[0].einrichtungName||null;
  const istStamm=e=> !!stamm && e.einrichtungName===stamm;
  const hatStd = eintraege.some(e=> (e.std||0)>0);
  let i=0, cumOE=0;
  while(i<n && istStamm(eintraege[i]) && cumOE<500){
    typ[i]="OE"; cumOE+=(eintraege[i].std||0); i++;
    if(hatStd && cumOE>=320) break;
    if(!hatStd && i>=2) break;
  }
  if(i===0){ typ[0]="OE"; i=1; }
  let j=n-1, cumVE=0;
  while(j>=i && istStamm(eintraege[j]) && cumVE<650){
    typ[j]="VE"; cumVE+=(eintraege[j].std||0); j--;
    if(hatStd && cumVE>=400) break;
    if(!hatStd) break;
  }
  if(j>=i && !typ.includes("VE") && n>1){
    for(let k=n-1;k>=i;k--){ if(istStamm(eintraege[k])){ typ[k]="VE"; j=k-1; break; } }
  }
  for(let k=i;k<=j;k++){
    if(typ[k]) continue;
    const b=eintraege[k].bereichVorschlag||"LZP";
    typ[k]= b==="WE" ? "WE" : "PE "+b;
  }
  for(let k=0;k<n;k++){ if(!typ[k]){ const b=eintraege[k].bereichVorschlag||"LZP"; typ[k]= b==="WE"?"WE":"PE "+b; } }
  return typ;
}
/* Pflichtbesuche markieren (v0.19): je Pflicht-Typ EIN empfohlener Besuch — am ERSTEN Teileinsatz
   dieses Typs (v0.19: geändert von „meiste Stunden" auf „erster", Christians Regel). Der Nutzer darf
   danach frei weitere Teileinsätze desselben Typs als Pflichtbesuch markieren (z.B. Probeexamen).
   WE und (bei PFA) Nicht-OE/VE nie Pflicht (Default).
   Ein Typ mit manuell festgelegtem Pflichtbesuch (pflichtManuell) wird komplett ausgenommen. */
function pflichtbesucheMarkieren(eintraege, ausbildung){
  const manuelleTypen=new Set();
  eintraege.forEach(e=>{ if(e.pflichtManuell!=null) manuelleTypen.add(e.typ); });
  eintraege.forEach(e=>{ if(e.pflichtManuell==null) e.pflichtbesuch=false; });
  const proTyp={};
  eintraege.forEach((e,idx)=>{
    if(manuelleTypen.has(e.typ)) return;
    if(!istPflicht(ausbildung,e.typ)) return;
    (proTyp[e.typ]=proTyp[e.typ]||[]).push(idx);
  });
  Object.keys(proTyp).forEach(t=>{
    const idxs=proTyp[t];               // Reihenfolge = Einsatzreihenfolge → idxs[0] ist der erste
    eintraege[idxs[0]].pflichtbesuch=true;
  });
}
/* Pflicht-Typen je Ausbildung. */
const PFK_PFLICHTTYPEN=["OE","PE Akut","PE LZP","PE Amb","PE Päd","PE Psych","VE"];
/* Vollständigkeitsprüfung (v0.15): Sind alle Pflicht-Typen abgedeckt?
   Fehlt ein PE-Typ und gibt es einen "flexiblen Spender" (Eintrag an einer Einrichtung, die den
   fehlenden Bereich kann, und dessen aktueller Typ über-abgedeckt ist, z.B. eine von zwei
   PE-Psych-Zeilen an Königshof), wird EIN Eintrag umgehängt und als `unsicher` markiert
   (Dozenten-Vorschlag). Lücken ohne Spender werden gemeldet, aber nichts erfunden.
   Liefert die Liste der weiterhin fehlenden Pflicht-Typen zurück. */
function verteilungPruefen(eintraege, ausbildung){
  const soll = ausbildung==="PFA" ? ["OE","VE"] : PFK_PFLICHTTYPEN;
  const vorhanden=()=> new Set(eintraege.map(e=>e.typVorschlag));
  soll.forEach(t=>{
    if(t==="OE"||t==="VE") return;
    if(vorhanden().has(t)) return;
    const bereich=t.replace(/^PE /,"");
    let best=-1, bestScore=-1;
    eintraege.forEach((e,i)=>{
      if(!(Einrichtungen.bereicheVon(e.einrichtungName)||[]).includes(bereich)) return;
      const akt=e.typVorschlag;
      if(akt==="OE"||akt==="VE") return;
      const anzahl=eintraege.filter(x=>x.typVorschlag===akt).length;
      if(anzahl<2) return;                       // nur über-abgedeckte Typen anzapfen
      let score=anzahl;
      const s=(e.einrichtungName||"").toLowerCase();
      if(bereich==="Akut" && /klinik|krankenhaus|hospital/.test(s) && !/psych/.test(s)) score+=5;
      if(score>bestScore){ bestScore=score; best=i; }
    });
    if(best>=0){ eintraege[best].typVorschlag=t; eintraege[best].unsicher=true; }
  });
  return soll.filter(t=> !vorhanden().has(t));
}
/* Eingebaute Startliste: 169 Einrichtungen mit Bereich(en) aus der Easysoft-Übersicht. */
/* ---------- SharePoint-Konfiguration (v0.20) ------------------------------
   Ab v0.20 kommt die Einrichtungsliste LIVE aus einer SharePoint-Liste,
   nicht mehr aus einer im Code eingebauten Konstante. Es liegen also keine
   Adressdaten mehr im ausgelieferten Code. Anmeldung ueber Microsoft (MSAL,
   Redirect-Flow). Bei fehlender Verbindung wird der zuletzt erfolgreich
   geladene Stand aus der lokalen Datenbank (IndexedDB) weiterverwendet. */
const SP_CONFIG = {
  tenantId : "143bce4a-6bc2-41ae-9379-5eb0ff0c6a20",
  clientId : "80cdb703-5c96-47a7-be93-6e24c9be2860",
  host     : "stelisabethakademie.sharepoint.com",
  sitePath : "/sites/St.Elisabeth-AkademiegGmbH",
  listName : "SEA_Einrichtungen_Startliste",   /* bei Umbenennung hier anpassen */
  scopes   : ["Sites.Selected"]
};
/* Zuordnung SharePoint-Spalte -> App-Feld. Heisst eine Spalte in SharePoint
   anders (z.B. "Title" statt "Name"), hier den Namen anpassen. */
const SP_FELDER = { name:"Title", bereiche:"field_1", plz:"field_2", ort:"field_3",
                    strasse:"field_4", aliase:"field_5", stamm:"field_6", schule:"field_7" };

/* Anzeige: ISO (YYYY-MM-DD) -> DD.MM.YYYY */
function fmtDatum(iso){ const m=(iso||"").match(/^(\d{4})-(\d{2})-(\d{2})/); return m?`${m[3]}.${m[2]}.${m[1]}`:(iso||""); }
/* kleines Kalender-Icon (monochrom, nimmt die Textfarbe an) für die Datumszeile der Anstehend-Karten */
const KD_ICO = '<svg class="kd-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>';

/* „Mein Name" -> sicherer Dateiname-Stamm (ohne Endung). Leer = "" (Export blockiert). */
function dateinameVonLabel(label){
  const map={"ä":"ae","ö":"oe","ü":"ue","ß":"ss"};
  return (label||"").trim().toLowerCase()
    .replace(/[äöüß]/g, c=>map[c]||c)
    .replace(/\s+/g,"-")
    .replace(/[^a-z0-9_-]/g,"")
    .replace(/-+/g,"-").replace(/^-+|-+$/g,"");
}

/* ---------- DB: dünne IndexedDB-Hülle --------------------------------- */
const DB = {
  _db:null,
  async oeffnen(){
    if(this._db) return this._db;
    this._db = await new Promise((ok,err)=>{
      const a = indexedDB.open("sea-praxisbesuche",1);
      a.onupgradeneeded = ()=>{
        const d=a.result;
        if(!d.objectStoreNames.contains("app")) d.createObjectStore("app");
        if(!d.objectStoreNames.contains("sicherungen")) d.createObjectStore("sicherungen");
      };
      a.onsuccess=()=>ok(a.result);
      a.onerror =()=>err(a.error);
    });
    return this._db;
  },
  async _tx(store,modus,fn){
    const d=await this.oeffnen();
    return new Promise((ok,err)=>{
      const tx=d.transaction(store,modus); const s=tx.objectStore(store);
      const r=fn(s); tx.oncomplete=()=>ok(r&&r.result); tx.onerror=()=>err(tx.error);
    });
  },
  get(store,key){ return this._tx(store,"readonly",s=>s.get(key)); },
  set(store,key,val){ return this._tx(store,"readwrite",s=>s.put(val,key)); },
  del(store,key){ return this._tx(store,"readwrite",s=>s.delete(key)); },
  keys(store){ return this._tx(store,"readonly",s=>s.getAllKeys()); }
};

/* ---------- Daten: zentraler Zustand ---------------------------------- */
const Daten = {
  state:null,
  leererState(){
    return { schemaVersion:1, aktualisiertAm:new Date().toISOString(), geraet:"", privatAdresse:null,
             besuchDauerMin:37,                              /* v0.17: geplante Dauer je Besuch (Minuten) */
             maxSammelGroesse:3,                             /* v0.18: max. Azubis gleichzeitig an einer Einrichtung */
             exportAusstehend:false,
             meldungen:[],                                   /* v0.19: Feedback der Kolleg:innen (fürs Dashboard) */
             azubis:[], azubiNamen:{}, einrichtungen:[], termine:[], touren:[] };
  },
  async laden(){
    try{ this.state = await DB.get("app","haupt") || this.leererState(); }
    catch(e){ this.state=this.leererState(); Oberflaeche.toast("Konnte Daten nicht laden – starte leer.",true); }
    // Sanftes Auffüllen fehlender Felder (Schema-Toleranz)
    const l=this.leererState(); for(const k in l) if(this.state[k]===undefined) this.state[k]=l[k];
    (this.state.einrichtungen||[]).forEach(e=>{ if(e.bereiche===undefined) e.bereiche = e.bereich? [e.bereich] : []; if(e.stamm===undefined) e.stamm=false; if(e.schule===undefined) e.schule=false;
      if(e.lat===undefined) e.lat=null; if(e.lng===undefined) e.lng=null; });   /* v0.16: Koordinaten reserviert (Geocodierung folgt in Schritt 3/5) */
    /* Besuchsstatus-Migration: altes Set → Lebenslauf (offen/vorläufig/geplant/durchgeführt/nachzuholen).
       „vorläufig" ist neu in v0.16 und steht jetzt in STATUS – Altdaten kennen ihn nicht, das ist unkritisch. */
    (this.state.azubis||[]).forEach(a=>(a.einsaetze||[]).forEach(e=>{
      if(e.besuchStatus==="erledigt") e.besuchStatus="durchgeführt";
      if(e.besuchStatus==="informiert") e.besuchStatus="offen";
      if(!STATUS.includes(e.besuchStatus)) e.besuchStatus="offen";
      if(e.besuchNotiz===undefined) e.besuchNotiz="";
      if(e.sammelbesuchId===undefined) e.sammelbesuchId=null;   /* v0.16: reserviert (Touren-Tab) */
    }));
    return this.state;
  },
  /* EINE Speicherfunktion mit Fehlerabfang – verhindert stillen Datenverlust.
     ohneKennzeichnung=true: Export-Hinweis NICHT setzen (z.B. nach Export selbst, Housekeeping). */
  async speichern(meldung, ohneKennzeichnung){
    if(!ohneKennzeichnung) this.state.exportAusstehend=true;
    this.state.aktualisiertAm=new Date().toISOString();
    try{
      await DB.set("app","haupt",this.state);
      Oberflaeche.standAnzeigen();
      if(meldung!==false) Oberflaeche.toast(meldung||"Gespeichert");
      return true;
    }catch(e){
      Oberflaeche.toast("FEHLER: Nicht gespeichert! "+(e&&e.message||e),true);
      return false;
    }
  },
  /* Selbsttest der Datenschicht – Ausgabe in der Konsole (F12) */
  async selbsttest(){
    const log=[]; const p=(t,ok)=>{log.push((ok?"✓":"✗")+" "+t); return ok;};
    const sicherung = JSON.parse(JSON.stringify(this.state));
    try{
      // 1 schreiben/lesen
      await DB.set("app","_test",{a:1,u:"äöü"}); const r=await DB.get("app","_test");
      p("schreiben/lesen identisch", r&&r.a===1&&r.u==="äöü"); await DB.del("app","_test");
      // 2 Merge: neuer gewinnt pro Azubi
      const alt={id:"x",aktualisiertAm:"2024-01-01T00:00:00Z",kurs:"alt"};
      const neu={id:"x",aktualisiertAm:"2025-01-01T00:00:00Z",kurs:"neu"};
      const m=Merge.azubiMerge([alt],[neu]); p("Merge: neuer Stand gewinnt", m[0].kurs==="neu");
      // 3 Backup/Restore
      await Sicherung.anlegen(); const keys=await DB.keys("sicherungen");
      p("Backup angelegt", keys.length>0);
    }catch(e){ log.push("✗ Ausnahme: "+e.message); }
    finally{ this.state=sicherung; }
    console.log("%c[Selbsttest Datenschicht]","font-weight:bold", "\n"+log.join("\n"));
    Oberflaeche.toast("Selbsttest fertig – Ergebnis in der Konsole (F12)");
  }
};

/* ---------- Merge: pro Azubi gewinnt der neuere Stand ----------------- */
const Merge = {
  azubiMerge(bestand, eingehend){
    const map=new Map(bestand.map(a=>[a.id,a]));
    for(const e of eingehend){
      const b=map.get(e.id);
      if(!b){ map.set(e.id,e); continue; }
      const neuer = new Date(e.aktualisiertAm||0) >= new Date(b.aktualisiertAm||0);
      // Besuchsstände des Bestands über Einsatz (von+typ) bewahren
      const bewahrt = neuer ? this._statusUebernehmen(e,b) : b;
      map.set(e.id, bewahrt);
    }
    return [...map.values()];
  },
  _statusUebernehmen(neu, alt){
    const altMap=new Map((alt.einsaetze||[]).map(x=>[x.von+"|"+x.typ,x]));
    (neu.einsaetze||[]).forEach(x=>{
      const a=altMap.get(x.von+"|"+x.typ);
      if(a){ x.besuchStatus=a.besuchStatus; x.besuchDatum=a.besuchDatum; x.besuchUhrzeit=a.besuchUhrzeit; }
    });
    return neu;
  },
  vollMerge(eingehend){
    const s=Daten.state;
    if(eingehend.einrichtungen) Einrichtungen.merge(eingehend.einrichtungen);
    if(eingehend.azubis) s.azubis=this.azubiMerge(s.azubis, eingehend.azubis);
    if(eingehend.azubiNamen) Object.assign(s.azubiNamen, eingehend.azubiNamen);
    if(eingehend.termine) s.termine=eingehend.termine.concat(s.termine.filter(t=>!eingehend.termine.find(e=>e.id===t.id)));
  }
};

/* ---------- Sicherung: Auto-Backup, letzte 5 -------------------------- */
const Sicherung = {
  async anlegen(){
    const key=new Date().toISOString();
    await DB.set("sicherungen",key, JSON.parse(JSON.stringify(Daten.state)));
    await this.aufraeumen();
    return key;
  },
  async aufraeumen(){
    const keys=(await DB.keys("sicherungen")).sort();
    while(keys.length>5){ await DB.del("sicherungen",keys.shift()); }
  },
  async liste(){ return (await DB.keys("sicherungen")).sort().reverse(); },
  async alleLoeschen(){ const keys=await DB.keys("sicherungen"); for(const k of keys) await DB.del("sicherungen",k); },
  async wiederherstellen(key){

    if(!s){ Oberflaeche.toast("Sicherung nicht gefunden",true); return; }
    Daten.state=s; await Daten.speichern("Sicherung wiederhergestellt"); Oberflaeche.render();
